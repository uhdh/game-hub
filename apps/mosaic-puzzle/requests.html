<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>요청 게시판</title>
<link rel="icon" type="image/png" href="./assets/favicon.png">
<script defer src="/_vercel/insights/script.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #0f0f12;
    min-height: 100vh;
    font-family: -apple-system, "Pretendard", "Segoe UI", "Malgun Gothic", sans-serif;
    color: #e7ebee;
  }
  a { color: #5fb8b0; text-decoration: none; }
  a:hover { color: #7fcac3; }

  #app {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 24px 16px 48px;
  }
  .col {
    width: 100%;
    max-width: 430px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .top-bar {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .back-link {
    font-size: 13px;
    color: #8992a0;
  }
  .admin-toggle {
    margin-left: auto;
    font-size: 12px;
    color: #5b6270;
    cursor: pointer;
    user-select: none;
  }
  .admin-toggle.on {
    color: #7fcac3;
    font-weight: 700;
  }
  .admin-login {
    display: none;
    gap: 6px;
    background: #15181c;
    border: 1px solid rgba(255, 255, 255, .06);
    border-radius: 12px;
    padding: 10px 12px;
  }
  .admin-login.show { display: flex; }
  .admin-login input {
    flex: 1;
    min-width: 0;
    background: #1c2024;
    border: 1px solid rgba(255, 255, 255, .1);
    border-radius: 8px;
    padding: 8px 10px;
    color: #e7ebee;
    font-size: 13px;
    font-family: inherit;
  }
  .admin-login button {
    flex: 0 0 auto;
    background: #2a2e33;
    color: #e7ebee;
    border: none;
    border-radius: 8px;
    padding: 0 12px;
    font-size: 13px;
    cursor: pointer;
  }

  .header {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 2px 4px 0;
  }
  .header .title {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .header .subtitle {
    font-size: 12.5px;
    color: #8992a0;
  }

  .composer {
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: #15181c;
    border: 1px solid rgba(255, 255, 255, .06);
    border-radius: 16px;
    padding: 14px 14px;
  }
  .composer .row {
    display: flex;
    gap: 8px;
  }
  .composer input[type="text"] {
    flex: 1;
    min-width: 0;
    background: #1c2024;
    border: 1px solid rgba(255, 255, 255, .1);
    border-radius: 10px;
    padding: 10px 12px;
    color: #e7ebee;
    font-size: 14px;
    font-family: inherit;
  }
  .composer input[type="text"]::placeholder { color: #5b6270; }
  .nickname-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #8992a0;
  }
  .nickname-row input {
    width: 120px;
    background: #1c2024;
    border: 1px solid rgba(255, 255, 255, .1);
    border-radius: 8px;
    padding: 6px 8px;
    color: #e7ebee;
    font-size: 12px;
    font-family: inherit;
  }
  .char-count {
    margin-left: auto;
  }
  .submit-btn {
    flex: 0 0 auto;
    background: #5fb8b0;
    color: #0f0f12;
    border: none;
    border-radius: 10px;
    padding: 0 16px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }
  .submit-btn:disabled {
    background: #2a2e33;
    color: #5b6270;
    cursor: not-allowed;
  }

  .sort-tabs {
    display: flex;
    gap: 6px;
  }
  .sort-tab {
    flex: 1;
    text-align: center;
    padding: 8px 0;
    border-radius: 10px;
    background: #15181c;
    border: 1px solid rgba(255, 255, 255, .06);
    color: #8992a0;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .sort-tab.active {
    background: rgba(95, 184, 176, .16);
    border-color: rgba(95, 184, 176, .5);
    color: #7fcac3;
  }

  .post-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .post-card {
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: #15181c;
    border: 1px solid rgba(255, 255, 255, .06);
    border-radius: 14px;
    padding: 12px 14px;
  }
  .post-body {
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .post-line {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .post-content {
    flex: 1;
    min-width: 0;
    font-size: 14px;
    line-height: 1.4;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .post-content.expandable {
    cursor: pointer;
  }
  .post-content.expanded {
    white-space: normal;
    overflow: visible;
    text-overflow: clip;
    word-break: break-word;
  }
  .status-badge {
    flex: 0 0 auto;
    font-size: 10.5px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 999px;
  }
  .status-badge.status-reviewing { background: rgba(139, 146, 160, .15); color: #8992a0; }
  .status-badge.status-accepted { background: rgba(95, 184, 176, .16); color: #7fcac3; }
  .status-badge.status-rejected { background: rgba(224, 138, 138, .16); color: #e08a8a; }
  .post-time, .post-author {
    flex: 0 0 auto;
    font-size: 11.5px;
    color: #5b6270;
    white-space: nowrap;
  }
  .post-author { color: #8992a0; }
  .reply-slot {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .admin-status-edit {
    display: flex;
    gap: 6px;
  }
  .admin-status-edit button {
    flex: 1;
    background: #1c2024;
    border: 1px solid rgba(255, 255, 255, .1);
    border-radius: 8px;
    padding: 5px 0;
    color: #8992a0;
    font-size: 11.5px;
    font-weight: 600;
    cursor: pointer;
  }
  .admin-status-edit button.active {
    background: rgba(95, 184, 176, .16);
    border-color: rgba(95, 184, 176, .5);
    color: #7fcac3;
  }
  .admin-reply {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(95, 184, 176, .08);
    border-left: 2px solid rgba(95, 184, 176, .5);
    border-radius: 6px;
    padding: 6px 8px;
    font-size: 12.5px;
    line-height: 1.4;
    color: #bfe8e3;
  }
  .admin-reply .badge {
    flex: 0 0 auto;
    font-weight: 700;
    color: #7fcac3;
  }
  .admin-reply .reply-text {
    flex: 1;
    min-width: 0;
    word-break: break-word;
  }
  .admin-reply-edit {
    display: flex;
    gap: 6px;
  }
  .admin-reply-edit input {
    flex: 1;
    min-width: 0;
    background: #1c2024;
    border: 1px solid rgba(255, 255, 255, .1);
    border-radius: 8px;
    padding: 6px 8px;
    color: #e7ebee;
    font-size: 12.5px;
    font-family: inherit;
  }
  .admin-reply-edit button {
    flex: 0 0 auto;
    background: #2a2e33;
    color: #e7ebee;
    border: none;
    border-radius: 8px;
    padding: 0 10px;
    font-size: 12px;
    cursor: pointer;
  }
  .vote-btn {
    flex: 0 0 auto;
    margin-left: auto;
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 5px;
    padding: 4px 2px;
    color: #8992a0;
    font-size: 11px;
    cursor: pointer;
  }
  .vote-btn .arrow { font-size: 15px; line-height: 1; }
  .vote-btn .count { font-size: 13px; font-weight: 700; color: #e7ebee; }
  .vote-btn.voted {
    color: #7fcac3;
  }
  .vote-btn.voted .count { color: #7fcac3; }

  .empty-state {
    text-align: center;
    color: #5b6270;
    font-size: 13px;
    padding: 30px 0;
  }

  .status-msg {
    font-size: 12px;
    color: #e08a8a;
    min-height: 16px;
  }
</style>
</head>
<body>
<div id="app">
  <div class="col">
    <div class="top-bar">
      <a class="back-link" href="./index.html">← 홈으로</a>
      <span class="admin-toggle" id="admin-toggle">관리자</span>
    </div>

    <div class="admin-login" id="admin-login">
      <input type="password" id="admin-pw-input" placeholder="관리자 비밀번호" autocomplete="off" autocapitalize="off" spellcheck="false">
      <button type="button" id="admin-pw-toggle">👁</button>
      <button type="button" id="admin-pw-submit">확인</button>
    </div>

    <div class="header">
      <span class="title">요청 게시판</span>
      <span class="subtitle">만들어줬으면 하는 게임, 버그 제보, 기능 제안을 한 줄로 남겨주세요</span>
    </div>

    <div class="composer">
      <div class="row">
        <input type="text" id="content-input" placeholder="예: 오목에 관전 모드 추가해주세요" maxlength="120">
        <button class="submit-btn" id="submit-btn">등록</button>
      </div>
      <div class="nickname-row">
        <span>닉네임</span>
        <input type="text" id="nickname-input" maxlength="20">
        <span class="char-count" id="char-count">0/120</span>
      </div>
      <div class="status-msg" id="status-msg"></div>
    </div>

    <div class="sort-tabs">
      <div class="sort-tab" id="sort-hot">추천순</div>
      <div class="sort-tab active" id="sort-new">최신순</div>
    </div>

    <div class="post-list" id="post-list"></div>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://paktzmofotvwfdxcpmzv.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_jWbstEn2pKJTNDxLTR4Jig_asglvzGW";
  const REQUESTS_TABLE = "feature_requests";
  const VOTES_TABLE = "feature_request_votes";
  const NICKNAME_KEY = "featureBoardNickname";
  const VOTER_ID_KEY = "featureBoardVoterId";
  const ADMIN_PW_KEY = "featureBoardAdminPw";

  // ---- 랜덤 닉네임 ----
  const NICKNAME_POOL = [
    "이상민", "정근우", "박지민", "이태균", "하승진", "현성주", "윤비", "이진형", "홍진호", "서출구",
    "최혜선", "허성범", "김경훈", "김유현", "김남희", "강지후", "곽범", "이관희", "신승용", "덕후",
  ];
  function randomNickname() {
    const word = NICKNAME_POOL[Math.floor(Math.random() * NICKNAME_POOL.length)];
    const num = Math.floor(Math.random() * 999) + 1;
    return `${word}#${num}`;
  }
  function getOrCreateStoredNickname(key) {
    const saved = localStorage.getItem(key);
    if (saved) return saved;
    const generated = randomNickname();
    localStorage.setItem(key, generated);
    return generated;
  }
  // ---- 랜덤 닉네임 끝 ----

  function getVoterId() {
    let id = localStorage.getItem(VOTER_ID_KEY);
    if (!id) {
      id = crypto.randomUUID();
      localStorage.setItem(VOTER_ID_KEY, id);
    }
    return id;
  }

  function getVotedSet() {
    try {
      return new Set(JSON.parse(localStorage.getItem("featureBoardVotedIds") || "[]"));
    } catch {
      return new Set();
    }
  }
  function markVoted(id) {
    const s = getVotedSet();
    s.add(id);
    localStorage.setItem("featureBoardVotedIds", JSON.stringify([...s]));
  }

  const nicknameInput = document.getElementById("nickname-input");
  nicknameInput.value = getOrCreateStoredNickname(NICKNAME_KEY);
  nicknameInput.addEventListener("change", () => {
    const v = nicknameInput.value.trim();
    if (v) localStorage.setItem(NICKNAME_KEY, v);
    else nicknameInput.value = getOrCreateStoredNickname(NICKNAME_KEY);
  });

  const contentInput = document.getElementById("content-input");
  const charCount = document.getElementById("char-count");
  contentInput.addEventListener("input", () => {
    charCount.textContent = `${contentInput.value.length}/120`;
  });

  function sbHeaders(extra) {
    return Object.assign(
      { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` },
      extra || {}
    );
  }

  async function fetchRequests() {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/${REQUESTS_TABLE}?select=id,nickname,content,created_at,admin_reply,admin_reply_at,status&order=created_at.desc&limit=500`,
      { headers: sbHeaders() }
    );
    if (!res.ok) throw new Error("목록 조회 실패");
    return res.json();
  }

  async function fetchVoteCounts() {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/${VOTES_TABLE}?select=request_id`,
      { headers: sbHeaders() }
    );
    if (!res.ok) throw new Error("추천 조회 실패");
    const rows = await res.json();
    const counts = new Map();
    rows.forEach((r) => counts.set(r.request_id, (counts.get(r.request_id) || 0) + 1));
    return counts;
  }

  async function submitRequest(nickname, content) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${REQUESTS_TABLE}`, {
      method: "POST",
      headers: sbHeaders({ "Content-Type": "application/json", Prefer: "return=minimal" }),
      body: JSON.stringify({ nickname, content }),
    });
    if (!res.ok) throw new Error("등록 실패");
  }

  async function submitVote(requestId) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${VOTES_TABLE}`, {
      method: "POST",
      headers: sbHeaders({ "Content-Type": "application/json", Prefer: "return=minimal" }),
      body: JSON.stringify({ request_id: requestId, voter_id: getVoterId() }),
    });
    if (!res.ok && res.status !== 409) throw new Error("추천 실패");
  }

  async function callAdminReply(requestId, reply, password) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/submit_admin_reply`, {
      method: "POST",
      headers: sbHeaders({ "Content-Type": "application/json" }),
      body: JSON.stringify({ p_request_id: requestId, p_reply: reply, p_password: password }),
    });
    if (!res.ok) throw new Error("실패");
  }

  async function callSetStatus(requestId, status, password) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/set_request_status`, {
      method: "POST",
      headers: sbHeaders({ "Content-Type": "application/json" }),
      body: JSON.stringify({ p_request_id: requestId, p_status: status, p_password: password }),
    });
    if (!res.ok) throw new Error("실패");
  }

  const STATUS_LABELS = { reviewing: "검토중", accepted: "반영", rejected: "반려" };

  let isAdmin = false;

  async function tryEnableAdmin(password, { silent } = {}) {
    try {
      await callAdminReply(-1, "", password);
      isAdmin = true;
      localStorage.setItem(ADMIN_PW_KEY, password);
      document.getElementById("admin-toggle").classList.add("on");
      document.getElementById("admin-login").classList.remove("show");
      render();
      return true;
    } catch (e) {
      isAdmin = false;
      localStorage.removeItem(ADMIN_PW_KEY);
      if (!silent) showStatus("비밀번호가 올바르지 않아요");
      return false;
    }
  }

  function getAdminPassword() {
    return localStorage.getItem(ADMIN_PW_KEY) || "";
  }

  let currentSort = "new";
  let allPosts = [];
  let voteCounts = new Map();

  function formatTime(iso) {
    const d = new Date(iso);
    const now = new Date();
    const diffMs = now - d;
    const diffMin = Math.floor(diffMs / 60000);
    if (diffMin < 1) return "방금 전";
    if (diffMin < 60) return `${diffMin}분 전`;
    const diffHour = Math.floor(diffMin / 60);
    if (diffHour < 24) return `${diffHour}시간 전`;
    const diffDay = Math.floor(diffHour / 24);
    if (diffDay < 7) return `${diffDay}일 전`;
    return `${d.getMonth() + 1}.${d.getDate()}`;
  }

  function render() {
    const list = document.getElementById("post-list");
    list.innerHTML = "";

    const votedSet = getVotedSet();
    const sorted = [...allPosts].sort((a, b) => {
      if (currentSort === "hot") {
        const va = voteCounts.get(a.id) || 0;
        const vb = voteCounts.get(b.id) || 0;
        if (vb !== va) return vb - va;
        return new Date(b.created_at) - new Date(a.created_at);
      }
      return new Date(b.created_at) - new Date(a.created_at);
    });

    if (!sorted.length) {
      const empty = document.createElement("div");
      empty.className = "empty-state";
      empty.textContent = "아직 등록된 요청이 없어요. 첫 요청을 남겨보세요!";
      list.appendChild(empty);
      return;
    }

    sorted.forEach((post) => {
      const count = voteCounts.get(post.id) || 0;
      const voted = votedSet.has(post.id);

      const status = post.status || "reviewing";
      const card = document.createElement("div");
      card.className = "post-card";
      card.innerHTML = `
        <div class="post-body">
          <div class="post-line">
            <span class="status-badge status-${status}">${STATUS_LABELS[status]}</span>
            <span class="post-content"></span>
            <span class="post-time">${formatTime(post.created_at)}</span>
            <span class="post-author"></span>
          </div>
          <div class="reply-slot"></div>
        </div>
      `;
      const contentEl = card.querySelector(".post-content");
      contentEl.textContent = post.content;
      contentEl.title = post.content;
      card.querySelector(".post-author").textContent = post.nickname;

      const voteBtn = document.createElement("div");
      voteBtn.className = `vote-btn ${voted ? "voted" : ""}`;
      voteBtn.dataset.id = post.id;
      voteBtn.innerHTML = `<span class="arrow">👍</span><span class="count">${count}</span>`;

      const replySlot = card.querySelector(".reply-slot");
      if (isAdmin) {
        const statusRow = document.createElement("div");
        statusRow.className = "admin-status-edit";
        statusRow.innerHTML = `
          <button type="button" data-status="reviewing">검토중</button>
          <button type="button" data-status="accepted">반영</button>
          <button type="button" data-status="rejected">반려</button>
        `;
        statusRow.querySelectorAll("button").forEach((btn) => {
          if (btn.dataset.status === status) btn.classList.add("active");
          btn.addEventListener("click", async () => {
            try {
              await callSetStatus(post.id, btn.dataset.status, getAdminPassword());
              post.status = btn.dataset.status;
              render();
            } catch (e) {
              showStatus("상태 변경에 실패했어요");
            }
          });
        });
        replySlot.appendChild(statusRow);

        const editRow = document.createElement("div");
        editRow.className = "admin-reply-edit";
        editRow.innerHTML = `
          <input type="text" maxlength="300" placeholder="답변을 입력하세요">
          <button type="button">등록</button>
        `;
        const input = editRow.querySelector("input");
        input.value = post.admin_reply || "";
        editRow.querySelector("button").addEventListener("click", async () => {
          const reply = input.value.trim();
          try {
            await callAdminReply(post.id, reply, getAdminPassword());
            post.admin_reply = reply || null;
            post.admin_reply_at = reply ? new Date().toISOString() : null;
            render();
          } catch (e) {
            showStatus("답변 등록에 실패했어요");
          }
        });
        replySlot.appendChild(editRow);
        replySlot.appendChild(voteBtn);
      } else if (post.admin_reply) {
        const reply = document.createElement("div");
        reply.className = "admin-reply";
        reply.innerHTML = `<span class="badge">운영자</span><span class="reply-text"></span>`;
        reply.querySelector(".reply-text").textContent = post.admin_reply;
        reply.appendChild(voteBtn);
        replySlot.appendChild(reply);
      } else {
        replySlot.appendChild(voteBtn);
      }

      list.appendChild(card);

      if (contentEl.scrollWidth > contentEl.clientWidth) {
        contentEl.classList.add("expandable");
        contentEl.setAttribute("role", "button");
        contentEl.setAttribute("tabindex", "0");
        contentEl.setAttribute("aria-expanded", "false");
        const toggleContent = () => {
          const expanded = contentEl.classList.toggle("expanded");
          contentEl.setAttribute("aria-expanded", String(expanded));
        };
        contentEl.addEventListener("click", toggleContent);
        contentEl.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            toggleContent();
          }
        });
      }
    });

    list.querySelectorAll(".vote-btn").forEach((btn) => {
      btn.addEventListener("click", async () => {
        const id = Number(btn.dataset.id);
        if (getVotedSet().has(id)) return;
        btn.classList.add("voted");
        const countEl = btn.querySelector(".count");
        countEl.textContent = String((voteCounts.get(id) || 0) + 1);
        markVoted(id);
        try {
          await submitVote(id);
          voteCounts.set(id, (voteCounts.get(id) || 0) + 1);
        } catch (e) {
          showStatus("추천 처리 중 문제가 발생했어요");
        }
      });
    });
  }

  function showStatus(msg) {
    const el = document.getElementById("status-msg");
    el.textContent = msg || "";
    if (msg) setTimeout(() => { if (el.textContent === msg) el.textContent = ""; }, 3000);
  }

  async function loadAll() {
    try {
      const [posts, counts] = await Promise.all([fetchRequests(), fetchVoteCounts()]);
      allPosts = posts;
      voteCounts = counts;
      render();
    } catch (e) {
      showStatus("목록을 불러오지 못했어요");
    }
  }

  document.getElementById("sort-hot").addEventListener("click", () => {
    currentSort = "hot";
    document.getElementById("sort-hot").classList.add("active");
    document.getElementById("sort-new").classList.remove("active");
    render();
  });
  document.getElementById("sort-new").addEventListener("click", () => {
    currentSort = "new";
    document.getElementById("sort-new").classList.add("active");
    document.getElementById("sort-hot").classList.remove("active");
    render();
  });

  const submitBtn = document.getElementById("submit-btn");
  async function handleSubmit() {
    const content = contentInput.value.trim();
    if (!content) return;
    if (content.length > 120) {
      showStatus("120자 이내로 작성해주세요");
      return;
    }
    const nickname = nicknameInput.value.trim() || getOrCreateStoredNickname(NICKNAME_KEY);
    submitBtn.disabled = true;
    try {
      await submitRequest(nickname, content);
      contentInput.value = "";
      charCount.textContent = "0/120";
      await loadAll();
    } catch (e) {
      showStatus("등록에 실패했어요. 잠시 후 다시 시도해주세요");
    } finally {
      submitBtn.disabled = false;
    }
  }
  submitBtn.addEventListener("click", handleSubmit);
  contentInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") handleSubmit();
  });

  const adminToggle = document.getElementById("admin-toggle");
  const adminLogin = document.getElementById("admin-login");
  const adminPwInput = document.getElementById("admin-pw-input");
  adminToggle.addEventListener("click", () => {
    if (isAdmin) {
      isAdmin = false;
      localStorage.removeItem(ADMIN_PW_KEY);
      adminToggle.classList.remove("on");
      render();
      return;
    }
    adminLogin.classList.toggle("show");
  });
  document.getElementById("admin-pw-submit").addEventListener("click", async () => {
    const pw = adminPwInput.value.trim();
    if (!pw) return;
    const ok = await tryEnableAdmin(pw);
    if (ok) adminPwInput.value = "";
  });
  adminPwInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") document.getElementById("admin-pw-submit").click();
  });
  document.getElementById("admin-pw-toggle").addEventListener("click", () => {
    adminPwInput.type = adminPwInput.type === "password" ? "text" : "password";
  });

  loadAll().then(() => {
    const savedPw = getAdminPassword();
    if (savedPw) tryEnableAdmin(savedPw, { silent: true });
  });
</script>
</body>
</html>
