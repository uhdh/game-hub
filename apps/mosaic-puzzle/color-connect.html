<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Connect Solo</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
<script defer src="/_vercel/insights/script.js"></script>
<style>
  @keyframes cc-pop { 0%{ transform:scale(0.9); opacity:0 } 100%{ transform:scale(1); opacity:1 } }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #0f0f12;
    color: #e7ebee;
    font-family: -apple-system, "Pretendard", "Segoe UI", "Malgun Gothic", sans-serif;
    min-height: 100vh;
  }
  #frame {
    width: 390px;
    max-width: 100%;
    margin: 24px auto;
    border-radius: 28px;
    box-shadow: 0 20px 50px rgba(0,0,0,.5);
    overflow: hidden;
    border: 1px solid rgba(255,255,255,.06);
    background: #15181c;
  }
  #header {
    position: sticky; top: 0;
    background: #15181c;
    padding: 16px 18px 14px;
    border-bottom: 1px solid rgba(255,255,255,.07);
    display: flex; flex-direction: column; gap: 10px;
    z-index: 1;
  }
  #header .title-row { display: flex; justify-content: space-between; align-items: center; }
  #header .title-row span.app-title { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; }
  #header .title-row .right { display: flex; align-items: center; gap: 8px; }
  #stage-badge {
    font-size: 11px; font-weight: 600; padding: 5px 11px; border-radius: 999px;
    background: #242a30; color: #5fb8b0; border: 1px solid rgba(255,255,255,.07);
    white-space: nowrap; flex-shrink: 0;
  }
  .nav-link {
    font-size: 11px; font-weight: 600; padding: 6px 10px; min-height: 28px;
    border-radius: 8px; border: 1px solid rgba(255,255,255,.1);
    background: #1c2024; color: #8992a0; white-space: nowrap; flex-shrink: 0;
    text-decoration: none; display: inline-flex; align-items: center;
    font-family: inherit; cursor: pointer;
  }
  #score-row { display: flex; align-items: center; gap: 16px; }
  #total-score { font-size: 32px; font-weight: 800; font-variant-numeric: tabular-nums; }
  #score-bars { flex: 1; display: flex; gap: 10px; }
  .score-bar-cell { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .score-bar-track { width: 100%; height: 8px; border-radius: 999px; transition: opacity .2s; }
  .score-bar-cell .val { font-size: 15px; font-weight: 700; color: #e7ebee; font-variant-numeric: tabular-nums; }

  #body { padding: 18px; display: flex; flex-direction: column; gap: 16px; }

  #board-wrap { position: relative; width: 100%; aspect-ratio: 1; }
  #board {
    position: relative; width: 100%; height: 100%;
    display: grid; grid-template-columns: repeat(4,1fr); grid-template-rows: repeat(4,1fr);
    gap: 8px; background: #1c2024; border: 1px solid rgba(255,255,255,.07);
    border-radius: 18px; padding: 10px;
  }
  .cell {
    position: relative; border-radius: 9px; overflow: hidden; background: #242a30;
    transition: background .12s, box-shadow .12s;
  }
  .cell.drag-over { background: rgba(95,184,176,0.25); box-shadow: inset 0 0 0 2px #5fb8b0; }
  .cell.placeable { box-shadow: inset 0 0 0 2px rgba(95,184,176,.53); cursor: pointer; }
  .quads {
    position: absolute; inset: 2px; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
    gap: 2px; border-radius: 6px; overflow: hidden; transition: filter .12s;
  }
  .quads.slidable { cursor: pointer; }
  .quads.slidable:hover { filter: brightness(1.15); }
  .quad { border-radius: 3px; }

  #market-row { display: flex; gap: 10px; justify-content: center; }
  .market-card {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px;
    background: #1c2024; border: 2px solid rgba(255,255,255,.14); border-radius: 16px;
    padding: 10px 6px; min-height: 44px; transition: opacity .12s, border-color .12s;
  }
  .market-card.selected { border-color: #5fb8b0; box-shadow: 0 0 0 2px rgba(95,184,176,.33); }
  .market-card.dragging { opacity: .35; }
  .market-tile {
    width: 64px; height: 64px; border-radius: 10px; background: #242a30;
    display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 2px;
    overflow: hidden; padding: 2px; cursor: grab;
  }
  .rotate-btn {
    font-size: 11.5px; font-weight: 600; padding: 8px 10px; min-height: 36px; min-width: 44px;
    border-radius: 8px; border: 1px solid rgba(255,255,255,.1); background: #242a30; color: #e7ebee;
    cursor: pointer;
  }

  #hint { text-align: center; font-size: 12px; color: #8992a0; }
  #optimal-path { text-align: center; font-size: 12.5px; color: #e7ebee; min-height: 16px; word-break: break-all; }

  #nickname-row { display: flex; align-items: center; gap: 8px; }
  #nickname-row label { font-size: 12.5px; color: #8992a0; flex-shrink: 0; }
  #nickname-input {
    flex: 1; min-width: 0; background: #1c2024; border: 1px solid rgba(255,255,255,.1);
    border-radius: 8px; padding: 8px 10px; color: #e7ebee; font-size: 13px; font-family: inherit;
  }
  #nickname-input::placeholder { color: #565c66; font-weight: 500; }

  #upcoming-row { display: flex; gap: 8px; justify-content: center; overflow-x: auto; }
  .upcoming-tile {
    flex: 0 0 auto; width: 38px; height: 38px; border-radius: 8px; overflow: hidden;
    display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
    opacity: .55; border: 1px solid rgba(255,255,255,.08);
  }

  #action-row { display: flex; justify-content: center; gap: 10px; }
  .btn {
    font-size: 14px; font-weight: 600; padding: 12px 22px; min-height: 44px;
    border-radius: 10px; border: none; cursor: pointer;
  }
  .btn-primary { background: linear-gradient(90deg,#5fb8b0,#5b8fc4); color: #0f1214; }
  .btn-ghost { font-size: 13.5px; padding: 12px 20px; border: 1px solid rgba(255,255,255,.09); background: #242a30; color: #e7ebee; }

  #modal-overlay {
    position: fixed; inset: 0; background: rgba(10,10,14,.72); display: none;
    align-items: center; justify-content: center; z-index: 50; padding: 20px;
  }
  #modal-overlay.show { display: flex; }
  #modal-box {
    background: #1c2024; border: 1px solid rgba(255,255,255,.08); border-radius: 18px;
    padding: 28px 26px; max-width: 320px; width: 100%; text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,.5); animation: cc-pop .18s ease;
  }
  #modal-box h2 { margin: 0 0 6px; font-size: 20px; color: #e7ebee; }
  #modal-total { font-size: 44px; font-weight: 800; margin: 14px 0; color: #5fb8b0; font-variant-numeric: tabular-nums; }
  #modal-top { display: flex; justify-content: center; gap: 20px; margin-bottom: 18px; }
  .modal-top-chip { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .modal-top-chip .swatch { width: 12px; height: 12px; border-radius: 4px; }
  .modal-top-chip .val { font-size: 14px; font-weight: 700; color: #e7ebee; }
  #leaderboard-section { border-top: 1px solid rgba(255,255,255,.08); margin: 2px 0 16px; padding-top: 14px; text-align: left; }
  #leaderboard-title { font-size: 11px; color: #8992a0; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; text-align: center; }
  #leaderboard-list { display: flex; flex-direction: column; gap: 6px; max-height: 180px; overflow-y: auto; }
  .lb-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 9px; background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.06); }
  .lb-row.new { background: rgba(95,184,176,.16); border-color: #5fb8b0; }
  .lb-rank { font-size: 12px; font-weight: 700; color: #8992a0; width: 18px; text-align: center; flex-shrink: 0; }
  .lb-nickname { flex: 1; min-width: 0; font-size: 13.5px; font-weight: 600; color: #e7ebee; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lb-score { flex-shrink: 0; font-size: 14px; font-weight: 700; color: #e7ebee; font-variant-numeric: tabular-nums; }
  .lb-date { flex-shrink: 0; font-size: 11px; color: #8992a0; }
</style>
</head>
<body>
<div id="frame">
  <div id="header">
    <div class="title-row">
      <span class="app-title">Color Connect Solo</span>
      <div class="right">
        <span id="stage-badge">배치 · 0/15</span>
        <button type="button" class="nav-link" id="ranking-btn">랭킹 보기</button>
        <a class="nav-link" href="index.html">홈</a>
      </div>
    </div>
    <div id="score-row">
      <span id="total-score">0</span>
      <div id="score-bars"></div>
    </div>
  </div>

  <div id="body">
    <div id="board-wrap"><div id="board"></div></div>

    <div id="market-row"></div>
    <div id="hint"></div>
    <div id="upcoming-row"></div>
    <div id="optimal-path"></div>

    <div id="nickname-row">
      <label for="nickname-input">닉네임</label>
      <input id="nickname-input" type="text" placeholder="리더보드에 표시할 이름" maxlength="12">
    </div>

    <div id="action-row">
      <button class="btn btn-primary" id="register-btn" style="display:none;">점수 등록</button>
      <button class="btn btn-ghost" id="optimal-btn" style="display:none;">옵티멀</button>
      <button class="btn btn-ghost" id="restart-btn">새 게임</button>
    </div>
  </div>
</div>

<div id="modal-overlay">
  <div id="modal-box">
    <h2 id="modal-title">점수 등록 완료!</h2>
    <div id="modal-total">0</div>
    <div id="modal-top"></div>
    <div id="leaderboard-section">
      <div id="leaderboard-title">리더보드</div>
      <div id="leaderboard-list"></div>
    </div>
    <button class="btn btn-primary" id="modal-restart-btn">다시하기</button>
  </div>
</div>

<script>
(function () {
  "use strict";

  const COLORS = ["R", "Y", "G", "B"];
  const PALETTE = { R: "#c96a63", Y: "#d3b263", G: "#5ca892", B: "#5b8fc4" };
  const ACCENT = "#5fb8b0";
  const BOARD_SIZE = 4;
  const TOTAL_TILES = 15;
  const SUPABASE_URL = "https://paktzmofotvwfdxcpmzv.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_jWbstEn2pKJTNDxLTR4Jig_asglvzGW";
  const SUPABASE_TABLE = "color_connect_leaderboard";
  const NICKNAME_KEY = "colorConnectNickname";

  // ---- 랜덤 닉네임 시작 ----
  const NICKNAME_POOL = [
    "이상민", "정근우", "박지민", "이태균", "하승진", "현성주", "윤비", "이진형", "홍진호", "서출구",
    "최혜선", "허성범", "김경훈", "김유현", "김남희", "강지후", "곽범", "이관희", "신승용", "최연청", "덕후",
  ];
  function randomNickname() {
    const word = NICKNAME_POOL[Math.floor(Math.random() * NICKNAME_POOL.length)];
    const num = Math.floor(Math.random() * 999) + 1;
    return `${word}#${num}`;
  }
  function getOrCreateStoredNickname(key) {
    const saved = localStorage.getItem(key);
    if (saved) return saved;
    const generated = randomNickname();
    localStorage.setItem(key, generated);
    return generated;
  }
  // ---- 랜덤 닉네임 끝 ----

  let queue = [];
  let selectedMarketIdx = null;
  let draggingIdx = null;
  let dragOverCell = null;
  let board = [];
  let emptyIndex = -1;
  let placedCount = 0;
  let stage = "placement";
  let justAddedId = null;
  let modalMode = "register";
  let animating = false;

  function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  const MONO_FOCUS_PROBABILITY = 13.5 / TOTAL_TILES;

  function buildTilePool() {
    const isMono = [];
    for (let i = 0; i < TOTAL_TILES; i++) isMono.push(Math.random() < MONO_FOCUS_PROBABILITY);
    const monoCount = isMono.filter(Boolean).length;
    let mainCycle = [];
    for (let i = 0; i < monoCount; i++) mainCycle.push(COLORS[i % 4]);
    mainCycle = shuffle(mainCycle);
    const tiles = [];
    let cycleIdx = 0;
    isMono.forEach(mono => {
      if (mono) {
        const mainColor = mainCycle[cycleIdx++];
        const rest = shuffle(COLORS.filter(c => c !== mainColor));
        tiles.push({ quads: shuffle([mainColor, mainColor, rest[0], rest[1]]) });
      } else {
        tiles.push({ quads: shuffle(COLORS) });
      }
    });
    return shuffle(tiles);
  }

  function rotateQuads(quads, times) {
    let q = quads.slice();
    for (let t = 0; t < ((times % 4) + 4) % 4; t++) q = [q[2], q[0], q[3], q[1]];
    return q;
  }

  async function fetchLeaderboard() {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?select=id,score,nickname,created_at&order=score.desc,created_at.asc&limit=10`,
      { headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` } }
    );
    if (!res.ok) throw new Error("리더보드 조회 실패");
    const rows = await res.json();
    return rows.map(r => ({ id: r.id, score: r.score, nickname: r.nickname, ts: new Date(r.created_at).getTime() }));
  }
  async function submitScore(score, nickname) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}`, {
      method: "POST",
      headers: {
        apikey: SUPABASE_ANON_KEY,
        Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
        "Content-Type": "application/json",
        Prefer: "return=representation"
      },
      body: JSON.stringify({ score, nickname })
    });
    if (!res.ok) throw new Error("점수 등록 실패");
    const [row] = await res.json();
    return { id: row.id, score: row.score, nickname: row.nickname, ts: new Date(row.created_at).getTime() };
  }
  function formatTs(ts) {
    const d = new Date(ts);
    const pad = n => String(n).padStart(2, "0");
    return `${pad(d.getMonth() + 1)}.${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  function initGame() {
    queue = buildTilePool().map(t => ({ quads: t.quads, rotation: 0 }));
    selectedMarketIdx = null;
    draggingIdx = null;
    dragOverCell = null;
    board = new Array(BOARD_SIZE * BOARD_SIZE).fill(null);
    emptyIndex = -1;
    placedCount = 0;
    stage = "placement";
    justAddedId = null;
    animating = false;
    document.getElementById("optimal-path").textContent = "";
    document.getElementById("modal-overlay").classList.remove("show");
    render();
  }

  function isAdjacentToEmpty(index) {
    if (emptyIndex < 0) return false;
    const r = Math.floor(index / BOARD_SIZE), c = index % BOARD_SIZE;
    const er = Math.floor(emptyIndex / BOARD_SIZE), ec = emptyIndex % BOARD_SIZE;
    return (Math.abs(r - er) + Math.abs(c - ec)) === 1;
  }

  function computeScoreForBoard(testBoard) {
    const N = BOARD_SIZE * 2;
    const grid = new Array(N * N).fill(null);
    testBoard.forEach((tile, ti) => {
      if (!tile) return;
      const tr = Math.floor(ti / BOARD_SIZE), tc = ti % BOARD_SIZE;
      const baseR = tr * 2, baseC = tc * 2;
      const positions = [[baseR, baseC], [baseR, baseC + 1], [baseR + 1, baseC], [baseR + 1, baseC + 1]];
      positions.forEach(([r, c], qi) => { grid[r * N + c] = tile.quads[qi]; });
    });
    const visited = new Array(N * N).fill(false);
    const bestByColor = { R: 0, Y: 0, G: 0, B: 0 };
    for (let idx = 0; idx < N * N; idx++) {
      if (visited[idx] || grid[idx] === null) continue;
      const color = grid[idx];
      let size = 0;
      const stack = [idx];
      visited[idx] = true;
      while (stack.length) {
        const cur = stack.pop();
        size++;
        const r = Math.floor(cur / N), c = cur % N;
        [[r - 1, c], [r + 1, c], [r, c - 1], [r, c + 1]].forEach(([nr, nc]) => {
          if (nr < 0 || nr >= N || nc < 0 || nc >= N) return;
          const nIdx = nr * N + nc;
          if (!visited[nIdx] && grid[nIdx] === color) { visited[nIdx] = true; stack.push(nIdx); }
        });
      }
      if (size > bestByColor[color]) bestByColor[color] = size;
    }
    const sorted = COLORS.slice().sort((a, b) => bestByColor[b] - bestByColor[a]);
    const topTwo = sorted.slice(0, 2);
    const total = topTwo.reduce((sum, c) => sum + bestByColor[c], 0);
    return { sizes: bestByColor, topTwo, total };
  }

  function computeScore() {
    return computeScoreForBoard(board);
  }

  // 빈칸과 인접한 타일을 하나씩 슬라이드하는 실제 규칙만으로 도달 가능한 상태들을
  // 빔 서치(beam search)로 탐색해, 점수가 가장 높은 상태와 거기까지의 이동 경로
  // (빈칸으로 밀려 들어가는 타일의 칸 번호 목록)를 찾는다.
  function findOptimalPath() {
    const BEAM_WIDTH = 200;
    const MAX_DEPTH = 80;
    const NO_IMPROVE_LIMIT = 25;

    function boardKey(b) {
      return b.map(t => (t ? t.quads.join("") : "_")).join("|");
    }

    const startBoard = board.slice();
    const startState = {
      board: startBoard,
      emptyIndex: emptyIndex,
      path: [],
      score: computeScoreForBoard(startBoard).total
    };

    let beam = [startState];
    const visited = new Set([boardKey(startBoard)]);
    let best = startState;
    let noImproveStreak = 0;

    for (let depth = 0; depth < MAX_DEPTH; depth++) {
      const candidates = [];
      for (const state of beam) {
        const r = Math.floor(state.emptyIndex / BOARD_SIZE), c = state.emptyIndex % BOARD_SIZE;
        const neighbors = [[r - 1, c], [r + 1, c], [r, c - 1], [r, c + 1]]
          .filter(([nr, nc]) => nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE)
          .map(([nr, nc]) => nr * BOARD_SIZE + nc);
        for (const ni of neighbors) {
          const nb = state.board.slice();
          nb[state.emptyIndex] = nb[ni];
          nb[ni] = null;
          const key = boardKey(nb);
          if (visited.has(key)) continue;
          visited.add(key);
          candidates.push({
            board: nb,
            emptyIndex: ni,
            path: state.path.concat(ni),
            score: computeScoreForBoard(nb).total
          });
        }
      }
      if (candidates.length === 0) break;
      candidates.sort((a, b) => b.score - a.score);
      beam = candidates.slice(0, BEAM_WIDTH);
      if (beam[0].score > best.score) {
        best = beam[0];
        noImproveStreak = 0;
      } else {
        noImproveStreak++;
      }
      if (noImproveStreak >= NO_IMPROVE_LIMIT) break;
    }
    return best;
  }

  async function showOptimal() {
    if (stage !== "sliding" || animating) return;
    const registerBtn = document.getElementById("register-btn");
    const optimalBtn = document.getElementById("optimal-btn");
    const restartBtn = document.getElementById("restart-btn");
    const pathEl = document.getElementById("optimal-path");

    optimalBtn.disabled = true;
    optimalBtn.textContent = "계산 중...";
    pathEl.textContent = "";
    await sleep(20);

    const result = findOptimalPath();

    if (result.path.length === 0) {
      pathEl.textContent = "이미 이 배치가 도달 가능한 최고 점수입니다.";
      optimalBtn.disabled = false;
      optimalBtn.textContent = "옵티멀";
      return;
    }

    animating = true;
    registerBtn.disabled = true;
    restartBtn.disabled = true;
    optimalBtn.textContent = "이동 중...";
    render();

    for (const step of result.path) {
      slideTile(step);
      await sleep(350);
    }

    animating = false;
    registerBtn.disabled = false;
    restartBtn.disabled = false;
    optimalBtn.disabled = false;
    optimalBtn.textContent = "옵티멀";
    render();
    pathEl.textContent = "정답: " + result.path.join(" → ");
  }

  function placeTile(marketIdx, cellIndex) {
    if (marketIdx === null || marketIdx === undefined || stage !== "placement") return;
    if (board[cellIndex]) return;
    const tile = queue[marketIdx];
    if (!tile) return;
    const rotated = rotateQuads(tile.quads, tile.rotation);
    board[cellIndex] = { quads: rotated };
    queue.splice(marketIdx, 1);
    selectedMarketIdx = null;
    placedCount++;
    if (placedCount >= TOTAL_TILES) {
      emptyIndex = board.indexOf(null);
      stage = "sliding";
    }
    render();
  }

  function slideTile(index) {
    if (stage !== "sliding" || !isAdjacentToEmpty(index)) return;
    board[emptyIndex] = board[index];
    board[index] = null;
    emptyIndex = index;
    render();
  }

  async function registerScore() {
    const result = computeScore();
    const nicknameInput = document.getElementById("nickname-input");
    const nickname = nicknameInput.value.trim() || getOrCreateStoredNickname(NICKNAME_KEY);
    localStorage.setItem(NICKNAME_KEY, nickname);
    const btn = document.getElementById("register-btn");
    btn.disabled = true;
    btn.textContent = "등록 중...";
    try {
      const entry = await submitScore(result.total, nickname);
      justAddedId = entry.id;
      const lb = await fetchLeaderboard();
      modalMode = "register";
      renderModal(result, lb);
      document.getElementById("modal-overlay").classList.add("show");
    } catch (e) {
      alert("점수 등록에 실패했습니다. 네트워크 연결을 확인해주세요.");
    } finally {
      btn.disabled = false;
      btn.textContent = "점수 등록";
    }
  }

  async function showRanking() {
    const btn = document.getElementById("ranking-btn");
    btn.disabled = true;
    try {
      const lb = await fetchLeaderboard();
      modalMode = "view";
      renderModal(null, lb);
      document.getElementById("modal-overlay").classList.add("show");
    } catch (e) {
      alert("랭킹을 불러오지 못했습니다. 네트워크 연결을 확인해주세요.");
    } finally {
      btn.disabled = false;
    }
  }

  function makeQuadsEl(quads, extraClass) {
    const wrap = document.createElement("div");
    wrap.className = "quads" + (extraClass ? " " + extraClass : "");
    quads.forEach(l => {
      const d = document.createElement("div");
      d.className = "quad";
      d.style.background = PALETTE[l];
      wrap.appendChild(d);
    });
    return wrap;
  }

  function renderHeader() {
    document.getElementById("stage-badge").textContent =
      stage === "placement" ? `배치 · ${placedCount}/${TOTAL_TILES}` :
      stage === "sliding" ? "슬라이딩 · 정렬하세요" : "종료";
    const result = computeScore();
    document.getElementById("total-score").textContent = result.total;
    const bars = document.getElementById("score-bars");
    bars.innerHTML = "";
    COLORS.forEach(l => {
      const cell = document.createElement("div");
      cell.className = "score-bar-cell";
      const track = document.createElement("div");
      track.className = "score-bar-track";
      track.style.background = PALETTE[l];
      track.style.opacity = result.topTwo.includes(l) ? "1" : "0.45";
      const val = document.createElement("div");
      val.className = "val";
      val.textContent = result.sizes[l];
      cell.appendChild(track);
      cell.appendChild(val);
      bars.appendChild(cell);
    });
  }

  function renderBoard() {
    const boardEl = document.getElementById("board");
    boardEl.innerHTML = "";
    for (let i = 0; i < board.length; i++) {
      const cell = document.createElement("div");
      cell.className = "cell";
      const tile = board[i];
      if (tile) {
        const slidable = stage === "sliding" && !animating && isAdjacentToEmpty(i);
        const quadsEl = makeQuadsEl(tile.quads, slidable ? "slidable" : "");
        if (slidable) quadsEl.addEventListener("click", () => slideTile(i));
        cell.appendChild(quadsEl);
      } else {
        if (stage === "placement" && selectedMarketIdx !== null) cell.classList.add("placeable");
        if (dragOverCell === i) cell.classList.add("drag-over");
        cell.addEventListener("click", () => placeTile(selectedMarketIdx, i));
        cell.addEventListener("dragover", (e) => {
          if (stage !== "placement" || board[i]) return;
          e.preventDefault();
          if (dragOverCell !== i) { dragOverCell = i; renderBoard(); }
        });
        cell.addEventListener("dragleave", () => {
          if (dragOverCell === i) { dragOverCell = null; renderBoard(); }
        });
        cell.addEventListener("drop", (e) => {
          e.preventDefault();
          const idx = draggingIdx !== null ? draggingIdx : selectedMarketIdx;
          dragOverCell = null;
          placeTile(idx, i);
        });
      }
      boardEl.appendChild(cell);
    }
  }

  function renderMarket() {
    const row = document.getElementById("market-row");
    const hint = document.getElementById("hint");
    const upcomingRow = document.getElementById("upcoming-row");
    row.innerHTML = "";
    upcomingRow.innerHTML = "";

    if (stage !== "placement") {
      row.style.display = "none";
      hint.textContent = stage === "sliding" ? "빈칸과 맞닿은 타일을 클릭하면 이동합니다." : "게임 종료";
      upcomingRow.style.display = "none";
      return;
    }
    row.style.display = "flex";
    upcomingRow.style.display = "flex";

    const front = queue.slice(0, 3);
    front.forEach((tile, idx) => {
      const card = document.createElement("div");
      card.className = "market-card" + (selectedMarketIdx === idx ? " selected" : "") + (draggingIdx === idx ? " dragging" : "");

      const rotated = rotateQuads(tile.quads, tile.rotation);
      const tileEl = document.createElement("div");
      tileEl.className = "market-tile";
      tileEl.draggable = true;
      rotated.forEach(l => {
        const d = document.createElement("div");
        d.style.background = PALETTE[l];
        d.style.borderRadius = "3px";
        tileEl.appendChild(d);
      });
      tileEl.addEventListener("click", () => {
        selectedMarketIdx = (selectedMarketIdx === idx) ? null : idx;
        render();
      });
      tileEl.addEventListener("dragstart", (e) => {
        e.dataTransfer.setData("text/plain", String(idx));
        e.dataTransfer.effectAllowed = "move";
        draggingIdx = idx;
        render();
      });
      tileEl.addEventListener("dragend", () => {
        draggingIdx = null;
        dragOverCell = null;
        render();
      });

      const rotateBtn = document.createElement("button");
      rotateBtn.className = "rotate-btn";
      rotateBtn.textContent = "↻";
      rotateBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        tile.rotation = (tile.rotation + 1) % 4;
        render();
      });

      card.appendChild(tileEl);
      card.appendChild(rotateBtn);
      row.appendChild(card);
    });

    hint.textContent = selectedMarketIdx !== null
      ? "보드의 빈칸을 클릭하거나, 타일을 드래그해서 놓으세요."
      : "타일을 클릭해 선택하거나, 바로 드래그해서 보드에 놓으세요.";

    queue.slice(3).forEach(tile => {
      const frame = document.createElement("div");
      frame.className = "upcoming-tile";
      tile.quads.forEach(l => {
        const d = document.createElement("div");
        d.style.background = PALETTE[l];
        frame.appendChild(d);
      });
      upcomingRow.appendChild(frame);
    });
  }

  function renderActionRow() {
    document.getElementById("register-btn").style.display = stage === "sliding" ? "inline-block" : "none";
    document.getElementById("optimal-btn").style.display = stage === "sliding" ? "inline-block" : "none";
  }

  function renderModal(result, leaderboard) {
    const title = document.getElementById("modal-title");
    const totalEl = document.getElementById("modal-total");
    const top = document.getElementById("modal-top");
    const restartBtn = document.getElementById("modal-restart-btn");

    if (result) {
      title.textContent = "점수 등록 완료!";
      totalEl.style.display = "";
      top.style.display = "";
      restartBtn.textContent = "다시하기";
      totalEl.textContent = result.total;
      top.innerHTML = "";
      result.topTwo.forEach(l => {
        const chip = document.createElement("div");
        chip.className = "modal-top-chip";
        const sw = document.createElement("div");
        sw.className = "swatch";
        sw.style.background = PALETTE[l];
        const val = document.createElement("div");
        val.className = "val";
        val.textContent = result.sizes[l];
        chip.appendChild(sw);
        chip.appendChild(val);
        top.appendChild(chip);
      });
    } else {
      title.textContent = "랭킹";
      totalEl.style.display = "none";
      top.style.display = "none";
      restartBtn.textContent = "닫기";
    }

    const list = document.getElementById("leaderboard-list");
    list.innerHTML = "";
    if (!leaderboard.length) {
      const empty = document.createElement("div");
      empty.className = "lb-date";
      empty.style.textAlign = "center";
      empty.textContent = "아직 등록된 점수가 없어요.";
      list.appendChild(empty);
      return;
    }
    leaderboard.forEach((e, i) => {
      const row = document.createElement("div");
      row.className = "lb-row" + (e.id === justAddedId ? " new" : "");
      const rank = document.createElement("span");
      rank.className = "lb-rank";
      rank.textContent = i + 1;
      const nickname = document.createElement("span");
      nickname.className = "lb-nickname";
      nickname.textContent = e.nickname || "익명";
      const score = document.createElement("span");
      score.className = "lb-score";
      score.textContent = e.score + "점";
      const date = document.createElement("span");
      date.className = "lb-date";
      date.textContent = formatTs(e.ts);
      row.appendChild(rank);
      row.appendChild(nickname);
      row.appendChild(score);
      row.appendChild(date);
      list.appendChild(row);
    });
  }

  function render() {
    renderHeader();
    renderBoard();
    renderMarket();
    renderActionRow();
  }

  document.getElementById("register-btn").addEventListener("click", () => {
    if (stage === "sliding") registerScore();
  });
  document.getElementById("optimal-btn").addEventListener("click", showOptimal);
  document.getElementById("restart-btn").addEventListener("click", initGame);
  document.getElementById("ranking-btn").addEventListener("click", showRanking);
  document.getElementById("modal-restart-btn").addEventListener("click", () => {
    if (modalMode === "view") {
      document.getElementById("modal-overlay").classList.remove("show");
    } else {
      initGame();
    }
  });

  document.getElementById("nickname-input").value = getOrCreateStoredNickname(NICKNAME_KEY);

  initGame();
})();
</script>
</body>
</html>
