<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Connect Solo</title>
<link rel="icon" type="image/png" href="./assets/favicon.png">
<style>
  :root {
    --bg: #1e1e24;
    --panel: #26262e;
    --panel-light: #2f2f39;
    --border: #3a3a46;
    --text: #eaeaf0;
    --text-dim: #9797a6;
    --accent: #6c7bff;
    --accent-2: #ff6ba0;
    --R: #ff5d5d;
    --Y: #ffd257;
    --G: #4ade80;
    --B: #4dabf7;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Pretendard", "Segoe UI", "Malgun Gothic", sans-serif;
    min-height: 100vh;
  }
  #app {
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 16px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }
  h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin: 4px 0 0;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .subtitle {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: -12px;
  }

  .top-bar {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 18px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 16px;
  }
  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 64px;
  }
  .stat .label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .stat .value {
    font-size: 20px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  #stage-banner {
    font-size: 12px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 999px;
    background: var(--panel-light);
    color: var(--accent);
    border: 1px solid var(--border);
    white-space: nowrap;
  }

  /* Board */
  #board-wrap {
    position: relative;
    width: 100%;
    max-width: 420px;
    aspect-ratio: 1 / 1;
  }
  #board {
    position: relative;
    width: 100%;
    height: 100%;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 6px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 8px;
  }
  .cell {
    position: relative;
    border-radius: 8px;
    background: #18181d;
    overflow: hidden;
  }
  .cell.empty {
    background: repeating-linear-gradient(45deg, #18181d, #18181d 8px, #1c1c22 8px, #1c1c22 16px);
    border: 1px dashed var(--border);
  }
  .cell.droppable {
    cursor: pointer;
    box-shadow: inset 0 0 0 2px var(--accent);
  }
  .cell.placeable {
    cursor: pointer;
    box-shadow: inset 0 0 0 2px var(--accent-2);
  }
  .tile {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    border-radius: 8px;
    overflow: hidden;
    transition: transform 0.14s ease;
  }
  .tile.board-tile {
    position: absolute;
    inset: 0;
  }
  .tile .quad { width: 100%; height: 100%; }
  .tile.slidable { cursor: pointer; }
  .tile.slidable:hover { filter: brightness(1.12); }

  .color-R { background: var(--R); }
  .color-Y { background: var(--Y); }
  .color-G { background: var(--G); }
  .color-B { background: var(--B); }

  /* Market / store */
  #market-panel {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  #market-panel .panel-title {
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  #market-tiles {
    display: flex;
    gap: 12px;
    justify-content: center;
  }
  .market-tile-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .market-tile-frame {
    width: 76px;
    height: 76px;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: var(--panel-light);
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.15s;
  }
  .market-tile-frame:hover { border-color: var(--accent); transform: translateY(-2px); }
  .market-tile-frame.selected { border-color: var(--accent-2); box-shadow: 0 0 0 2px var(--accent-2); }
  .market-tile-frame .quad { width: 100%; height: 100%; }
  .market-tile-card .rotate-btn {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel-light);
    color: var(--text);
    cursor: pointer;
  }
  .market-tile-card .rotate-btn:hover { background: #383846; }

  #upcoming-title {
    margin-top: 2px;
  }
  #upcoming-tiles {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .upcoming-tile-frame {
    flex: 0 0 auto;
    width: 34px;
    height: 34px;
    border-radius: 6px;
    border: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    overflow: hidden;
    opacity: 0.4;
  }
  .upcoming-tile-frame .quad { width: 100%; height: 100%; }

  .hint {
    text-align: center;
    font-size: 12.5px;
    color: var(--text-dim);
    min-height: 16px;
  }

  /* Buttons */
  .btn {
    font-size: 14px;
    font-weight: 600;
    padding: 11px 20px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: filter 0.15s, transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary {
    background: linear-gradient(90deg, var(--accent), #8f6bff);
    color: white;
  }
  .btn-primary:hover { filter: brightness(1.08); }
  .btn-primary:disabled {
    background: #3a3a46;
    color: var(--text-dim);
    cursor: not-allowed;
  }
  .btn-ghost {
    background: var(--panel-light);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: #383846; }
  a.btn {
    display: inline-block;
    text-decoration: none;
    line-height: 1;
  }

  #action-row {
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 10px;
  }

  #score-preview {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 18px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
  }
  .score-chip {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .score-chip .swatch {
    width: 14px; height: 14px; border-radius: 4px;
  }
  .score-chip .num { font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .score-chip.top .num { color: var(--accent-2); }
  #final-score-total {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }

  /* Modal */
  #modal-overlay {
    position: fixed; inset: 0;
    background: rgba(10, 10, 14, 0.72);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 50;
    padding: 20px;
  }
  #modal-overlay.show { display: flex; }
  #modal-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px 26px;
    max-width: 360px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  #modal-box h2 {
    margin: 0 0 6px;
    font-size: 20px;
  }
  #modal-box .final-score {
    font-size: 44px;
    font-weight: 800;
    margin: 14px 0;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  #modal-breakdown {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-bottom: 18px;
  }

  @media (max-width: 420px) {
    .market-tile-frame { width: 64px; height: 64px; }
  }
</style>
</head>
<body>
<div id="app">
  <h1>Color Connect Solo</h1>
  <div class="subtitle">4x4 타일 퍼즐 · 색 덩어리를 최대한 크게 만드세요</div>

  <div class="top-bar">
    <div class="stat">
      <div class="label">단계</div>
      <div class="value" id="stage-value">배치</div>
    </div>
    <div id="stage-banner">타일 15 / 15</div>
  </div>

  <div id="board-wrap">
    <div id="board"></div>
  </div>

  <div id="market-panel">
    <div class="panel-title" id="market-title">다음 타일 — 앞 3장 중 선택하세요</div>
    <div id="market-tiles"></div>
    <div class="hint" id="hint-text">타일을 클릭해 선택한 뒤, 보드의 빈칸을 클릭해 배치하세요.</div>
    <div class="panel-title" id="upcoming-title">대기 타일 (순서대로 나옵니다)</div>
    <div id="upcoming-tiles"></div>
  </div>

  <div id="score-preview"></div>

  <div id="action-row">
    <button class="btn btn-primary" id="register-btn" style="display:none;">점수 등록</button>
    <button class="btn btn-ghost" id="restart-btn">새 게임</button>
    <a class="btn btn-ghost" id="rearrange-link" href="./피의게임-재배치.html">피의게임 재배치</a>
    <a class="btn btn-ghost" id="home-link" href="./index.html">홈</a>
  </div>
</div>

<div id="modal-overlay">
  <div id="modal-box">
    <h2 id="modal-title">게임 종료</h2>
    <div class="final-score" id="modal-final-score">0</div>
    <div id="modal-breakdown"></div>
    <button class="btn btn-primary" id="modal-restart-btn">다시하기</button>
  </div>
</div>

<script>
(function () {
  "use strict";

  const COLORS = ["R", "Y", "G", "B"];
  const COLOR_VAR = { R: "var(--R)", Y: "var(--Y)", G: "var(--G)", B: "var(--B)" };
  const BOARD_SIZE = 4;
  const TOTAL_TILES = 15;

  // quadrant order: 0=TL,1=TR,2=BL,3=BR
  // rotation rotates quadrants clockwise

  let queue = [];        // all remaining (unplaced) tiles in draw order: {quads, rotation}
  let selectedMarketIdx = null; // index into the front-3 slice of queue
  let board = [];       // 16 cells, each null or {quads:[...]} already rotated-baked
  let emptyIndex = -1;
  let placedCount = 0;
  let stage = "placement"; // "placement" | "sliding" | "ended"

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  // 15장 중 기대값 기준 단색 집중형(2:1:1) 13.5장 : 포 칼라 밸런스형(1:1:1:1) 1.5장 = 90% : 10% 확률
  const MONO_FOCUS_PROBABILITY = 13.5 / TOTAL_TILES;

  function buildTilePool() {
    const isMono = [];
    for (let i = 0; i < TOTAL_TILES; i++) {
      isMono.push(Math.random() < MONO_FOCUS_PROBABILITY);
    }
    const monoCount = isMono.filter(Boolean).length;

    // 단색 집중형 타일의 주력색을 4가지 색상에 최대한 고르게 순환 배분
    const mainCycle = [];
    for (let i = 0; i < monoCount; i++) mainCycle.push(COLORS[i % 4]);
    shuffle(mainCycle);

    const tiles = [];
    let cycleIdx = 0;
    isMono.forEach(mono => {
      if (mono) {
        const mainColor = mainCycle[cycleIdx++];
        const rest = COLORS.filter(c => c !== mainColor);
        shuffle(rest);
        const minorA = rest[0];
        const minorB = rest[1];
        const quads = shuffle([mainColor, mainColor, minorA, minorB]);
        tiles.push({ quads });
      } else {
        tiles.push({ quads: shuffle([...COLORS]) });
      }
    });

    return shuffle(tiles);
  }

  function rotateQuads(quads, times) {
    // quads index: 0 TL, 1 TR, 2 BL, 3 BR
    // clockwise rotation: TL->TR->BR->BL->TL  => new[1]=old[0], new[3]=old[1], new[2]=old[3], new[0]=old[2]
    let q = quads.slice();
    for (let t = 0; t < ((times % 4) + 4) % 4; t++) {
      q = [q[2], q[0], q[3], q[1]];
    }
    return q;
  }

  function initGame() {
    queue = buildTilePool().map(t => ({ quads: t.quads, rotation: 0 }));
    selectedMarketIdx = null;
    board = new Array(BOARD_SIZE * BOARD_SIZE).fill(null);
    emptyIndex = -1;
    placedCount = 0;
    stage = "placement";

    document.getElementById("modal-overlay").classList.remove("show");
    document.getElementById("register-btn").style.display = "none";
    document.getElementById("market-panel").style.display = "flex";

    render();
  }

  // ---------- Rendering ----------

  function renderTopBar() {
    document.getElementById("stage-value").textContent = stage === "placement" ? "배치" : (stage === "sliding" ? "슬라이딩" : "종료");
    const banner = document.getElementById("stage-banner");
    if (stage === "placement") {
      banner.textContent = `타일 ${TOTAL_TILES - placedCount} / ${TOTAL_TILES}`;
    } else if (stage === "sliding") {
      banner.textContent = "빈칸으로 밀어 정렬하세요";
    } else {
      banner.textContent = "게임 종료";
    }
  }

  function makeQuadEl(color) {
    const d = document.createElement("div");
    d.className = "quad color-" + color;
    return d;
  }

  function renderTileInto(container, quads, extraClasses) {
    container.innerHTML = "";
    container.classList.add("tile");
    if (extraClasses) extraClasses.split(" ").forEach(cls => container.classList.add(cls));
    quads.forEach(c => container.appendChild(makeQuadEl(c)));
  }

  function renderBoard() {
    const boardEl = document.getElementById("board");
    boardEl.innerHTML = "";
    for (let i = 0; i < board.length; i++) {
      const cell = document.createElement("div");
      cell.className = "cell";
      cell.dataset.index = i;

      const tileData = board[i];
      if (tileData) {
        const tileEl = document.createElement("div");
        const isSlidable = stage === "sliding" && isAdjacentToEmpty(i);
        renderTileInto(tileEl, tileData.quads, "board-tile" + (isSlidable ? " slidable" : ""));
        if (isSlidable) {
          tileEl.addEventListener("click", () => slideTile(i));
        }
        cell.appendChild(tileEl);
      } else {
        cell.classList.add("empty");
        if (stage === "placement" && selectedMarketIdx !== null) {
          cell.classList.add("placeable");
          cell.addEventListener("click", () => placeSelectedTile(i));
        }
      }
      boardEl.appendChild(cell);
    }
  }

  function renderMarket() {
    const wrap = document.getElementById("market-tiles");
    wrap.innerHTML = "";
    const title = document.getElementById("market-title");
    const marketPanel = document.getElementById("market-panel");
    const hint = document.getElementById("hint-text");
    const upcomingTitle = document.getElementById("upcoming-title");
    const upcomingWrap = document.getElementById("upcoming-tiles");
    upcomingWrap.innerHTML = "";

    if (stage !== "placement") {
      marketPanel.style.display = "none";
      return;
    }
    marketPanel.style.display = "flex";
    title.textContent = "다음 타일 — 앞 3장 중 선택하세요";

    const front = queue.slice(0, 3);
    front.forEach((tile, idx) => {
      const card = document.createElement("div");
      card.className = "market-tile-card";

      const frame = document.createElement("div");
      frame.className = "market-tile-frame" + (selectedMarketIdx === idx ? " selected" : "");
      const rotated = rotateQuads(tile.quads, tile.rotation);
      renderTileInto(frame, rotated, null);
      frame.addEventListener("click", () => {
        selectedMarketIdx = (selectedMarketIdx === idx) ? null : idx;
        render();
      });

      const rotateBtn = document.createElement("button");
      rotateBtn.className = "rotate-btn";
      rotateBtn.textContent = "↻ 회전";
      rotateBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        tile.rotation = (tile.rotation + 1) % 4;
        render();
      });

      card.appendChild(frame);
      card.appendChild(rotateBtn);
      wrap.appendChild(card);
    });

    const rest = queue.slice(3);
    if (rest.length > 0) {
      upcomingTitle.style.display = "block";
      upcomingWrap.style.display = "flex";
      rest.forEach(tile => {
        const frame = document.createElement("div");
        frame.className = "upcoming-tile-frame";
        renderTileInto(frame, tile.quads, null);
        upcomingWrap.appendChild(frame);
      });
    } else {
      upcomingTitle.style.display = "none";
      upcomingWrap.style.display = "none";
    }

    if (selectedMarketIdx !== null) {
      hint.textContent = "보드의 빈칸을 클릭해 타일을 배치하세요.";
    } else {
      hint.textContent = "타일을 클릭해 선택한 뒤, 보드의 빈칸을 클릭해 배치하세요.";
    }
  }

  function renderScorePreview() {
    const box = document.getElementById("score-preview");
    const result = computeScore();
    box.innerHTML = "";
    COLORS.forEach(c => {
      const chip = document.createElement("div");
      chip.className = "score-chip" + (result.topTwo.includes(c) ? " top" : "");
      const sw = document.createElement("div");
      sw.className = "swatch color-" + c;
      const num = document.createElement("div");
      num.className = "num";
      num.textContent = result.sizes[c];
      chip.appendChild(sw);
      chip.appendChild(num);
      box.appendChild(chip);
    });
    const totalChip = document.createElement("div");
    totalChip.id = "final-score-total";
    totalChip.textContent = "= " + result.total + "점";
    box.appendChild(totalChip);
  }

  function renderActionRow() {
    document.getElementById("register-btn").style.display = stage === "sliding" ? "inline-block" : "none";
  }

  function render() {
    renderTopBar();
    renderBoard();
    renderMarket();
    renderScorePreview();
    renderActionRow();
  }

  // ---------- Placement stage ----------

  function placeSelectedTile(cellIndex) {
    if (stage !== "placement" || selectedMarketIdx === null) return;
    const tile = queue[selectedMarketIdx];
    const rotated = rotateQuads(tile.quads, tile.rotation);
    board[cellIndex] = { quads: rotated };
    placedCount++;

    queue.splice(selectedMarketIdx, 1);
    selectedMarketIdx = null;

    if (placedCount >= TOTAL_TILES) {
      emptyIndex = board.indexOf(null);
      startSlidingStage();
      return;
    }
    render();
  }

  // ---------- Sliding stage ----------

  function startSlidingStage() {
    stage = "sliding";
    render();
  }

  function isAdjacentToEmpty(index) {
    if (emptyIndex < 0) return false;
    const r = Math.floor(index / BOARD_SIZE), c = index % BOARD_SIZE;
    const er = Math.floor(emptyIndex / BOARD_SIZE), ec = emptyIndex % BOARD_SIZE;
    return (Math.abs(r - er) + Math.abs(c - ec)) === 1;
  }

  function slideTile(index) {
    if (stage !== "sliding" || !isAdjacentToEmpty(index)) return;
    board[emptyIndex] = board[index];
    board[index] = null;
    emptyIndex = index;
    render();
  }

  // ---------- Scoring ----------

  function computeScore() {
    // Expand 4x4 tile board into 8x8 unit grid
    const N = BOARD_SIZE * 2;
    const grid = new Array(N * N).fill(null);
    for (let ti = 0; ti < board.length; ti++) {
      const tile = board[ti];
      if (!tile) continue;
      const tr = Math.floor(ti / BOARD_SIZE), tc = ti % BOARD_SIZE;
      const baseR = tr * 2, baseC = tc * 2;
      // quads: 0 TL,1 TR,2 BL,3 BR
      const positions = [
        [baseR, baseC], [baseR, baseC + 1],
        [baseR + 1, baseC], [baseR + 1, baseC + 1]
      ];
      positions.forEach(([r, c], qi) => {
        grid[r * N + c] = tile.quads[qi];
      });
    }

    const visited = new Array(N * N).fill(false);
    const bestByColor = { R: 0, Y: 0, G: 0, B: 0 };

    for (let idx = 0; idx < N * N; idx++) {
      if (visited[idx] || grid[idx] === null) continue;
      const color = grid[idx];
      // BFS
      let size = 0;
      const stack = [idx];
      visited[idx] = true;
      while (stack.length) {
        const cur = stack.pop();
        size++;
        const r = Math.floor(cur / N), c = cur % N;
        const neighbors = [
          [r - 1, c], [r + 1, c], [r, c - 1], [r, c + 1]
        ];
        neighbors.forEach(([nr, nc]) => {
          if (nr < 0 || nr >= N || nc < 0 || nc >= N) return;
          const nIdx = nr * N + nc;
          if (!visited[nIdx] && grid[nIdx] === color) {
            visited[nIdx] = true;
            stack.push(nIdx);
          }
        });
      }
      if (size > bestByColor[color]) bestByColor[color] = size;
    }

    const sorted = COLORS.slice().sort((a, b) => bestByColor[b] - bestByColor[a]);
    const topTwo = sorted.slice(0, 2);
    const total = topTwo.reduce((sum, c) => sum + bestByColor[c], 0);

    return { sizes: bestByColor, topTwo, total };
  }

  // ---------- End game ----------

  function endGame() {
    stage = "ended";
    const result = computeScore();

    render();

    document.getElementById("modal-title").textContent = "점수 등록 완료!";
    document.getElementById("modal-final-score").textContent = result.total;
    const breakdown = document.getElementById("modal-breakdown");
    breakdown.innerHTML = "";
    result.topTwo.forEach(c => {
      const chip = document.createElement("div");
      chip.className = "score-chip top";
      const sw = document.createElement("div");
      sw.className = "swatch color-" + c;
      const num = document.createElement("div");
      num.className = "num";
      num.textContent = result.sizes[c];
      chip.appendChild(sw);
      chip.appendChild(num);
      breakdown.appendChild(chip);
    });
    document.getElementById("modal-overlay").classList.add("show");
  }

  // ---------- Wiring ----------

  document.getElementById("register-btn").addEventListener("click", () => {
    if (stage === "sliding") endGame();
  });
  document.getElementById("restart-btn").addEventListener("click", initGame);
  document.getElementById("modal-restart-btn").addEventListener("click", initGame);

  initGame();
})();
</script>
</body>
</html>
