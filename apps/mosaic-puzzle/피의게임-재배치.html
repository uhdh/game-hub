<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>피의게임 재배치</title>
<link rel="icon" type="image/png" href="./assets/favicon.png">
<style>
  :root {
    --bg: #1e1e24;
    --panel: #26262e;
    --panel-light: #2f2f39;
    --border: #3a3a46;
    --text: #eaeaf0;
    --text-dim: #9797a6;
    --accent: #6c7bff;
    --accent-2: #ff6ba0;
    --R: #ff5d5d;
    --Y: #ffd257;
    --G: #4ade80;
    --B: #4dabf7;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Pretendard", "Segoe UI", "Malgun Gothic", sans-serif;
    min-height: 100vh;
  }
  #app {
    max-width: 640px;
    margin: 0 auto;
    padding: 24px 16px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }
  h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin: 4px 0 0;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .subtitle {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: -12px;
    text-align: center;
  }

  .top-bar {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 18px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 16px;
  }
  #stage-banner {
    font-size: 12px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 999px;
    background: var(--panel-light);
    color: var(--accent);
    border: 1px solid var(--border);
    white-space: nowrap;
  }

  /* Board */
  #board-wrap {
    position: relative;
    width: 100%;
    max-width: 420px;
    aspect-ratio: 1 / 1;
  }
  #board {
    position: relative;
    width: 100%;
    height: 100%;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 6px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 8px;
  }
  .cell {
    position: relative;
    border-radius: 8px;
    background: #18181d;
    overflow: hidden;
  }
  .cell.empty {
    background: repeating-linear-gradient(45deg, #18181d, #18181d 8px, #1c1c22 8px, #1c1c22 16px);
    border: 1px dashed var(--border);
  }
  .tile {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    border-radius: 8px;
    overflow: hidden;
    transition: transform 0.14s ease;
  }
  .tile.board-tile {
    position: absolute;
    inset: 0;
  }
  .tile .quad { width: 100%; height: 100%; }
  .tile.slidable { cursor: pointer; }
  .tile.slidable:hover { filter: brightness(1.12); }

  .color-R { background: var(--R); }
  .color-Y { background: var(--Y); }
  .color-G { background: var(--G); }
  .color-B { background: var(--B); }

  .hint {
    text-align: center;
    font-size: 12.5px;
    color: var(--text-dim);
  }

  /* Buttons */
  .btn {
    font-size: 14px;
    font-weight: 600;
    padding: 11px 20px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: filter 0.15s, transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary {
    background: linear-gradient(90deg, var(--accent), #8f6bff);
    color: white;
  }
  .btn-primary:hover { filter: brightness(1.08); }
  .btn-ghost {
    background: var(--panel-light);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: #383846; }
  a.btn {
    display: inline-block;
    text-decoration: none;
    line-height: 1;
  }

  #action-row {
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 10px;
  }

  #score-preview {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 18px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
  }
  .score-chip {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .score-chip .swatch {
    width: 14px; height: 14px; border-radius: 4px;
  }
  .score-chip .num { font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .score-chip.top .num { color: var(--accent-2); }
  #final-score-total {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }

  /* Modal */
  #modal-overlay {
    position: fixed; inset: 0;
    background: rgba(10, 10, 14, 0.72);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 50;
    padding: 20px;
  }
  #modal-overlay.show { display: flex; }
  #modal-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px 26px;
    max-width: 360px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  #modal-box h2 {
    margin: 0 0 6px;
    font-size: 20px;
  }
  #modal-box .final-score {
    font-size: 44px;
    font-weight: 800;
    margin: 14px 0;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  #modal-breakdown {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-bottom: 18px;
  }
</style>
</head>
<body>
<div id="app">
  <h1>피의게임 재배치</h1>
  <div class="subtitle">이미 놓인 타일을 슬라이딩으로 재배치해 점수를 올려보세요.</div>

  <div class="top-bar">
    <div id="stage-banner">빈칸으로 밀어 정렬하세요</div>
  </div>

  <div id="board-wrap">
    <div id="board"></div>
  </div>

  <div class="hint">빈칸과 상하좌우로 맞닿은 타일을 클릭하면 2x2 타일 전체가 그 자리로 이동합니다.</div>

  <div id="score-preview"></div>

  <div id="action-row">
    <button class="btn btn-primary" id="register-btn">점수 등록</button>
    <button class="btn btn-ghost" id="restart-btn">초기 배치로 리셋</button>
    <a class="btn btn-ghost" id="home-link" href="./index.html">홈</a>
  </div>
</div>

<div id="modal-overlay">
  <div id="modal-box">
    <h2 id="modal-title">점수 등록 완료!</h2>
    <div class="final-score" id="modal-final-score">0</div>
    <div id="modal-breakdown"></div>
    <button class="btn btn-primary" id="modal-restart-btn">다시하기</button>
  </div>
</div>

<script>
(function () {
  "use strict";

  const COLORS = ["R", "Y", "G", "B"];
  const BOARD_SIZE = 4; // 4x4 타일 보드 (기존 게임과 동일한 단위)

  // 문제에서 주어진 초기 배치 (E = 빈칸), 8x8 단위 격자
  const INITIAL_UNIT_ROWS = [
    ['R', 'B', 'R', 'B', 'E', 'E', 'B', 'G'],
    ['B', 'Y', 'Y', 'G', 'E', 'E', 'G', 'Y'],
    ['Y', 'G', 'R', 'G', 'G', 'Y', 'G', 'R'],
    ['R', 'Y', 'B', 'Y', 'Y', 'R', 'B', 'G'],
    ['R', 'Y', 'B', 'Y', 'Y', 'R', 'B', 'R'],
    ['B', 'Y', 'Y', 'G', 'Y', 'B', 'G', 'B'],
    ['B', 'Y', 'Y', 'Y', 'Y', 'B', 'G', 'B'],
    ['R', 'G', 'G', 'B', 'G', 'G', 'G', 'R']
  ];

  let board = [];       // 16 cells, each null(빈 타일) or {quads:[TL,TR,BL,BR]}
  let emptyIndex = -1;

  // 8x8 단위 격자를 기존 게임과 동일한 4x4 타일(2x2 묶음) 단위로 변환
  function buildInitialTiles() {
    const tiles = [];
    for (let tr = 0; tr < BOARD_SIZE; tr++) {
      for (let tc = 0; tc < BOARD_SIZE; tc++) {
        const r0 = tr * 2, c0 = tc * 2;
        const TL = INITIAL_UNIT_ROWS[r0][c0];
        const TR_ = INITIAL_UNIT_ROWS[r0][c0 + 1];
        const BL = INITIAL_UNIT_ROWS[r0 + 1][c0];
        const BR = INITIAL_UNIT_ROWS[r0 + 1][c0 + 1];
        if (TL === "E" && TR_ === "E" && BL === "E" && BR === "E") {
          tiles.push(null);
        } else {
          tiles.push({ quads: [TL, TR_, BL, BR] });
        }
      }
    }
    return tiles;
  }

  function loadInitialBoard() {
    board = buildInitialTiles();
    emptyIndex = board.indexOf(null);
  }

  function isAdjacentToEmpty(index) {
    if (emptyIndex < 0) return false;
    const r = Math.floor(index / BOARD_SIZE), c = index % BOARD_SIZE;
    const er = Math.floor(emptyIndex / BOARD_SIZE), ec = emptyIndex % BOARD_SIZE;
    return (Math.abs(r - er) + Math.abs(c - ec)) === 1;
  }

  function slideTile(index) {
    if (!isAdjacentToEmpty(index)) return;
    board[emptyIndex] = board[index];
    board[index] = null;
    emptyIndex = index;
    render();
  }

  // ---------- Scoring ----------

  function computeScore() {
    // 4x4 타일 보드를 8x8 단위 격자로 재전개
    const N = BOARD_SIZE * 2;
    const grid = new Array(N * N).fill(null);
    for (let ti = 0; ti < board.length; ti++) {
      const tile = board[ti];
      if (!tile) continue;
      const tr = Math.floor(ti / BOARD_SIZE), tc = ti % BOARD_SIZE;
      const baseR = tr * 2, baseC = tc * 2;
      const positions = [
        [baseR, baseC], [baseR, baseC + 1],
        [baseR + 1, baseC], [baseR + 1, baseC + 1]
      ];
      positions.forEach(([r, c], qi) => {
        grid[r * N + c] = tile.quads[qi];
      });
    }

    const visited = new Array(N * N).fill(false);
    const bestByColor = { R: 0, Y: 0, G: 0, B: 0 };

    for (let idx = 0; idx < N * N; idx++) {
      if (visited[idx] || grid[idx] === null) continue;
      const color = grid[idx];
      let size = 0;
      const stack = [idx];
      visited[idx] = true;
      while (stack.length) {
        const cur = stack.pop();
        size++;
        const r = Math.floor(cur / N), c = cur % N;
        const neighbors = [
          [r - 1, c], [r + 1, c], [r, c - 1], [r, c + 1]
        ];
        neighbors.forEach(([nr, nc]) => {
          if (nr < 0 || nr >= N || nc < 0 || nc >= N) return;
          const nIdx = nr * N + nc;
          if (!visited[nIdx] && grid[nIdx] === color) {
            visited[nIdx] = true;
            stack.push(nIdx);
          }
        });
      }
      if (size > bestByColor[color]) bestByColor[color] = size;
    }

    const sorted = COLORS.slice().sort((a, b) => bestByColor[b] - bestByColor[a]);
    const topTwo = sorted.slice(0, 2);
    const total = topTwo.reduce((sum, c) => sum + bestByColor[c], 0);

    return { sizes: bestByColor, topTwo, total };
  }

  // ---------- Rendering ----------

  function makeQuadEl(color) {
    const d = document.createElement("div");
    d.className = "quad color-" + color;
    return d;
  }

  function renderBoard() {
    const boardEl = document.getElementById("board");
    boardEl.innerHTML = "";
    for (let i = 0; i < board.length; i++) {
      const cell = document.createElement("div");
      cell.className = "cell";

      const tileData = board[i];
      if (tileData) {
        const tileEl = document.createElement("div");
        const slidable = isAdjacentToEmpty(i);
        tileEl.className = "tile board-tile" + (slidable ? " slidable" : "");
        tileData.quads.forEach(c => tileEl.appendChild(makeQuadEl(c)));
        if (slidable) {
          tileEl.addEventListener("click", () => slideTile(i));
        }
        cell.appendChild(tileEl);
      } else {
        cell.classList.add("empty");
      }
      boardEl.appendChild(cell);
    }
  }

  function renderScorePreview() {
    const box = document.getElementById("score-preview");
    const result = computeScore();
    box.innerHTML = "";
    COLORS.forEach(c => {
      const chip = document.createElement("div");
      chip.className = "score-chip" + (result.topTwo.includes(c) ? " top" : "");
      const sw = document.createElement("div");
      sw.className = "swatch color-" + c;
      const num = document.createElement("div");
      num.className = "num";
      num.textContent = result.sizes[c];
      chip.appendChild(sw);
      chip.appendChild(num);
      box.appendChild(chip);
    });
    const totalChip = document.createElement("div");
    totalChip.id = "final-score-total";
    totalChip.textContent = "= " + result.total + "점";
    box.appendChild(totalChip);
  }

  function render() {
    renderBoard();
    renderScorePreview();
  }

  // ---------- End / register ----------

  function registerScore() {
    const result = computeScore();
    document.getElementById("modal-final-score").textContent = result.total;
    const breakdown = document.getElementById("modal-breakdown");
    breakdown.innerHTML = "";
    result.topTwo.forEach(c => {
      const chip = document.createElement("div");
      chip.className = "score-chip top";
      const sw = document.createElement("div");
      sw.className = "swatch color-" + c;
      const num = document.createElement("div");
      num.className = "num";
      num.textContent = result.sizes[c];
      chip.appendChild(sw);
      chip.appendChild(num);
      breakdown.appendChild(chip);
    });
    document.getElementById("modal-overlay").classList.add("show");
  }

  function resetGame() {
    loadInitialBoard();
    document.getElementById("modal-overlay").classList.remove("show");
    render();
  }

  // ---------- Wiring ----------

  document.getElementById("register-btn").addEventListener("click", registerScore);
  document.getElementById("restart-btn").addEventListener("click", resetGame);
  document.getElementById("modal-restart-btn").addEventListener("click", resetGame);

  resetGame();
})();
</script>
</body>
</html>
