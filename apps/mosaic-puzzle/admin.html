<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>탈락자 관리 · 피의 게임 X 시뮬레이터</title>
<link rel="icon" type="image/png" href="./assets/favicon.png">
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<script src="./admin-auction-parse.js"></script>
<style>
  :root {
    --bg: #0b0c0f;
    --panel: #181b20;
    --panel-light: #21252b;
    --border: rgba(255,255,255,.10);
    --border-strong: rgba(255,255,255,.18);
    --text: #f7f9fb;
    --text-dim: #b7bfcc;
    --text-dimmer: #838c9b;
    --accent: #5fb8b0;
    --accent-hover: #7fcac3;
    --danger: #e0786f;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Pretendard", -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--accent); text-decoration: none; }

  #gate {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 24px;
    text-align: center;
  }
  #gate h1 { font-size: 18px; margin: 0; }
  #gate p { font-size: 13px; color: var(--text-dim); margin: 0; }
  #gate-form { display: flex; gap: 8px; }
  #gate-input {
    background: var(--panel);
    border: 1px solid var(--border-strong);
    color: var(--text);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 14px;
    width: 200px;
  }
  #gate-error { color: var(--danger); font-size: 12.5px; min-height: 16px; }

  .btn {
    font-size: 13.5px;
    font-weight: 700;
    padding: 10px 16px;
    border-radius: 10px;
    border: 1px solid var(--border-strong);
    background: var(--panel-light);
    color: var(--text);
    cursor: pointer;
  }
  .btn:hover { background: #2b3138; border-color: var(--accent); }
  .btn-danger { color: var(--danger); border-color: rgba(224,120,111,.4); }
  .btn-danger:hover { background: rgba(224,120,111,.12); border-color: var(--danger); }

  #app { display: none; }
  #app.show { display: block; }

  #app-inner {
    max-width: 480px;
    margin: 0 auto;
    padding: 28px 18px 64px;
    display: flex;
    flex-direction: column;
    gap: 22px;
  }

  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }
  .title { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; }
  .subtitle { font-size: 13px; color: var(--text-dim); margin-top: 4px; }
  .nav-links { display: flex; gap: 8px; }
  .nav-links a.btn { font-weight: 700; }

  .week-box {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
  }
  .week-box label { font-size: 13.5px; font-weight: 700; color: var(--text-dim); }
  .week-box input {
    width: 70px;
    background: var(--panel-light);
    border: 1px solid var(--border-strong);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 15px;
    font-weight: 700;
    text-align: center;
  }

  .status-banner {
    display: none;
    border-radius: 14px;
    padding: 12px 14px;
    font-size: 13px;
    font-weight: 600;
  }
  .status-banner.show { display: block; }
  .status-banner.ok { background: rgba(95,184,176,.12); border: 1px solid rgba(95,184,176,.35); color: var(--accent-hover); }
  .status-banner.err { background: rgba(224,120,111,.14); border: 1px solid rgba(224,120,111,.4); color: #f0a89f; }

  .team-block { display: flex; flex-direction: column; gap: 9px; }
  .team-label {
    display: inline-flex;
    align-self: flex-start;
    font-size: 12.5px;
    font-weight: 800;
    color: var(--team-color, var(--accent));
    background: color-mix(in srgb, var(--team-color, var(--accent)) 16%, transparent);
    border-radius: 8px;
    padding: 3px 10px;
  }

  .participant-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 12px;
  }
  .participant-row.eliminated { opacity: .6; }
  .p-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--team-color, var(--accent)); flex: 0 0 auto; }
  .p-name { font-size: 14.5px; font-weight: 700; flex: 1; }
  .p-name.struck { text-decoration: line-through; }
  .p-meta { font-size: 11.5px; color: var(--text-dimmer); flex: 0 0 auto; }

  .total-votes { font-size: 12px; color: var(--text-dimmer); text-align: center; }

  .tab-bar { display: flex; gap: 8px; }
  .tab-btn {
    flex: 1; font-size: 13px; font-weight: 700; padding: 10px 12px;
    border-radius: 10px; border: 1px solid var(--border-strong);
    background: var(--panel-light); color: var(--text-dim); cursor: pointer;
  }
  .tab-btn.active { background: rgba(95,184,176,.16); color: var(--text); border-color: var(--accent); }
  .tab-panel.hidden { display: none; }

  .auction-form-card {
    display: flex; flex-direction: column; gap: 8px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px;
  }
  .card-title { font-size: 13px; font-weight: 700; }
  .card-hint { font-size: 11.5px; color: var(--text-dimmer); }
  .auction-form-card input, .auction-form-card textarea {
    background: var(--panel-light); border: 1px solid var(--border-strong); color: var(--text);
    border-radius: 8px; padding: 9px 10px; font-size: 13.5px; font-family: inherit; resize: vertical;
  }
</style>
</head>
<body>

<div id="gate">
  <h1>🔒 관리자 인증</h1>
  <p>탈락자 처리는 관리자만 할 수 있습니다.</p>
  <form id="gate-form">
    <input id="gate-input" type="password" placeholder="비밀번호" autocomplete="off">
    <button type="submit" class="btn">입장</button>
  </form>
  <div id="gate-error"></div>
</div>

<div id="app">
  <div id="app-inner">
    <div class="header-row">
      <div>
        <div class="title" id="page-title">탈락자 관리</div>
        <div class="subtitle" id="page-subtitle">매주 탈락자를 처리하면 예측 페이지에 바로 반영됩니다.</div>
      </div>
      <div class="nav-links">
        <a class="btn" href="https://pgamex.vercel.app/">홈</a>
      </div>
    </div>

    <div class="tab-bar">
      <button type="button" class="tab-btn active" data-tab="elim">탈락자 관리</button>
      <button type="button" class="tab-btn" data-tab="auction">경매 물품 관리</button>
    </div>

    <div id="tab-elim" class="tab-panel">
      <div class="week-box">
        <label for="week-input">이번 탈락 처리 주차</label>
        <input id="week-input" type="number" min="1" value="1">
      </div>

      <div class="status-banner" id="status-banner"></div>

      <div id="teams"></div>
    </div>

    <div id="tab-auction" class="tab-panel hidden">
      <div class="status-banner" id="auction-count-banner"></div>
      <div class="status-banner" id="auction-action-banner"></div>

      <div class="auction-form-card">
        <div class="card-title">단건 등록</div>
        <input id="auction-name-input" type="text" placeholder="물품명" maxlength="40">
        <input id="auction-value-input" type="number" placeholder="가치" min="0">
        <input id="auction-memo-input" type="text" placeholder="메모(선택)" maxlength="80">
        <button type="button" class="btn" id="auction-add-btn">등록</button>
      </div>

      <div class="auction-form-card">
        <div class="card-title">여러 건 붙여넣기</div>
        <div class="card-hint">한 줄에 하나씩: 물품명, 가치, 메모(선택)</div>
        <textarea id="auction-bulk-input" rows="6" placeholder="금시계, 18, 스위스제&#10;광대열론, 3"></textarea>
        <button type="button" class="btn" id="auction-bulk-btn">일괄 등록</button>
      </div>

      <div id="auction-list"></div>
    </div>
  </div>
</div>

<script>
(function () {
  "use strict";

  const SUPABASE_URL = "https://paktzmofotvwfdxcpmzv.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_jWbstEn2pKJTNDxLTR4Jig_asglvzGW";
  const ELIMINATIONS_TABLE = "eliminations";
  const ADMIN_PASSWORD = "dbqlgusejr1234";
  const ADMIN_SESSION_KEY = "bloodGameXAdminOk";

  const TEAMS = [
    { key: "P1", label: "P1팀", color: "#ff6b6b", members: ["이상민", "박지민", "정근우", "이태균"] },
    { key: "P2", label: "P2팀", color: "#ffd166", members: ["하승진", "현성주", "윤비", "이진형"] },
    { key: "P3", label: "P3팀", color: "#51cf66", members: ["홍진호", "서출구", "최혜선", "허성범"] },
    { key: "C", label: "C팀", color: "#4dabf7", members: ["김경훈", "김유현", "김남희", "강지후"] },
    { key: "R", label: "R팀", color: "#cc5de8", members: ["곽범", "이관희", "신승용", "최연청"] },
  ];

  const PARTICIPANTS = TEAMS.flatMap(team =>
    team.members.map(name => ({
      key: `${team.key}-${name}`,
      name,
      teamKey: team.key,
      teamLabel: team.label,
      teamColor: team.color,
    }))
  );

  let ELIMINATED_MAP = new Map();

  function showStatus(msg, isErr) {
    const el = document.getElementById("status-banner");
    el.textContent = msg;
    el.className = "status-banner show " + (isErr ? "err" : "ok");
  }

  async function fetchEliminations() {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/${ELIMINATIONS_TABLE}?select=participant_key,week`,
      { headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` } }
    );
    if (!res.ok) throw new Error("탈락자 목록 조회 실패");
    const rows = await res.json();
    ELIMINATED_MAP = new Map(rows.map(r => [r.participant_key, r.week]));

    const weekInput = document.getElementById("week-input");
    const maxWeek = rows.reduce((m, r) => Math.max(m, r.week), 0);
    if (!weekInput.dataset.touched) weekInput.value = maxWeek + 1;
  }

  async function eliminate(key, week) {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/${ELIMINATIONS_TABLE}?on_conflict=participant_key`,
      {
        method: "POST",
        headers: {
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
          "Content-Type": "application/json",
          Prefer: "resolution=merge-duplicates,return=representation",
        },
        body: JSON.stringify({ participant_key: key, week }),
      }
    );
    if (!res.ok) throw new Error("탈락 처리 실패");
  }

  async function restore(key) {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/${ELIMINATIONS_TABLE}?participant_key=eq.${encodeURIComponent(key)}`,
      {
        method: "DELETE",
        headers: {
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
        },
      }
    );
    if (!res.ok) throw new Error("복구 실패");
  }

  function renderTeams() {
    const wrap = document.getElementById("teams");
    wrap.innerHTML = "";
    wrap.style.display = "flex";
    wrap.style.flexDirection = "column";
    wrap.style.gap = "16px";

    for (const team of TEAMS) {
      const block = document.createElement("div");
      block.className = "team-block";

      const label = document.createElement("div");
      label.className = "team-label";
      label.style.setProperty("--team-color", team.color);
      label.textContent = team.label;
      block.appendChild(label);

      for (const name of team.members) {
        const key = `${team.key}-${name}`;
        const week = ELIMINATED_MAP.get(key);
        const row = document.createElement("div");
        row.className = "participant-row" + (week ? " eliminated" : "");
        row.style.setProperty("--team-color", team.color);
        row.innerHTML = `
          <span class="p-dot"></span>
          <span class="p-name${week ? " struck" : ""}">${name}</span>
          <span class="p-meta">${week ? `${week}주차 탈락` : ""}</span>
        `;

        const btn = document.createElement("button");
        btn.type = "button";
        if (week) {
          btn.className = "btn";
          btn.textContent = "복구";
          btn.addEventListener("click", async () => {
            btn.disabled = true;
            try {
              await restore(key);
              showStatus(`${name}님을 복구했습니다.`);
              await fetchEliminations();
              renderTeams();
            } catch (err) {
              showStatus("복구에 실패했습니다. 다시 시도해주세요.", true);
              btn.disabled = false;
            }
          });
        } else {
          btn.className = "btn btn-danger";
          btn.textContent = "탈락 처리";
          btn.addEventListener("click", async () => {
            const week = parseInt(document.getElementById("week-input").value, 10) || 1;
            btn.disabled = true;
            try {
              await eliminate(key, week);
              showStatus(`${name}님을 ${week}주차 탈락 처리했습니다.`);
              await fetchEliminations();
              renderTeams();
            } catch (err) {
              showStatus("탈락 처리에 실패했습니다. 다시 시도해주세요.", true);
              btn.disabled = false;
            }
          });
        }
        row.appendChild(btn);
        block.appendChild(row);
      }
      wrap.appendChild(block);
    }
  }

  async function initApp() {
    document.getElementById("week-input").addEventListener("input", (e) => {
      e.target.dataset.touched = "1";
    });
    try {
      await fetchEliminations();
    } catch (err) {
      showStatus("탈락자 목록을 불러오지 못했습니다.", true);
    }
    renderTeams();
  }

  function unlock() {
    document.getElementById("gate").style.display = "none";
    document.getElementById("app").classList.add("show");
    initApp();
  }

  if (sessionStorage.getItem(ADMIN_SESSION_KEY) === "1") {
    unlock();
  }

  document.getElementById("gate-form").addEventListener("submit", (e) => {
    e.preventDefault();
    const val = document.getElementById("gate-input").value;
    if (val === ADMIN_PASSWORD) {
      sessionStorage.setItem(ADMIN_SESSION_KEY, "1");
      unlock();
    } else {
      document.getElementById("gate-error").textContent = "비밀번호가 올바르지 않습니다.";
    }
  });

  const AUCTION_TABLE = "auction_items";
  let AUCTION_ITEMS = [];
  let auctionTabInitialized = false;

  async function fetchAuctionItems() {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/${AUCTION_TABLE}?select=id,item_name,value,memo,created_at&order=created_at.desc`,
      { headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` } }
    );
    if (!res.ok) throw new Error("경매 물품 목록 조회 실패");
    AUCTION_ITEMS = await res.json();
  }

  async function insertAuctionItems(items) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${AUCTION_TABLE}`, {
      method: "POST",
      headers: {
        apikey: SUPABASE_ANON_KEY,
        Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
        "Content-Type": "application/json",
        Prefer: "return=representation",
      },
      body: JSON.stringify(items),
    });
    if (!res.ok) throw new Error("경매 물품 등록 실패");
    return res.json();
  }

  async function deleteAuctionItem(id) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${AUCTION_TABLE}?id=eq.${id}`, {
      method: "DELETE",
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` },
    });
    if (!res.ok) throw new Error("삭제 실패");
  }

  function renderAuctionCountBanner() {
    const el = document.getElementById("auction-count-banner");
    const count = AUCTION_ITEMS.length;
    el.className = "status-banner show " + (count >= 22 ? "ok" : "err");
    el.textContent = count >= 22
      ? `${count}건 등록됨 · 게임 시작 가능`
      : `${count}건 등록됨 · 게임 시작에 ${22 - count}건 더 필요`;
  }

  function showAuctionStatus(msg, isErr) {
    const el = document.getElementById("auction-action-banner");
    el.textContent = msg;
    el.className = "status-banner show " + (isErr ? "err" : "ok");
  }

  function renderAuctionList() {
    const wrap = document.getElementById("auction-list");
    wrap.innerHTML = "";
    wrap.style.display = "flex";
    wrap.style.flexDirection = "column";
    wrap.style.gap = "8px";

    for (const item of AUCTION_ITEMS) {
      const row = document.createElement("div");
      row.className = "participant-row";
      row.innerHTML = `
        <span class="p-name">${item.item_name}</span>
        <span class="p-meta">가치 ${item.value}${item.memo ? " · " + item.memo : ""}</span>
      `;
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "btn btn-danger";
      btn.textContent = "삭제";
      btn.addEventListener("click", async () => {
        btn.disabled = true;
        try {
          await deleteAuctionItem(item.id);
          await fetchAuctionItems();
          renderAuctionCountBanner();
          renderAuctionList();
        } catch (err) {
          showAuctionStatus("삭제에 실패했습니다.", true);
          btn.disabled = false;
        }
      });
      row.appendChild(btn);
      wrap.appendChild(row);
    }
  }

  async function initAuctionTab() {
    try {
      await fetchAuctionItems();
    } catch (err) {
      showAuctionStatus("경매 물품 목록을 불러오지 못했습니다.", true);
    }
    renderAuctionCountBanner();
    renderAuctionList();

    document.getElementById("auction-add-btn").addEventListener("click", async () => {
      const nameInput = document.getElementById("auction-name-input");
      const valueInput = document.getElementById("auction-value-input");
      const memoInput = document.getElementById("auction-memo-input");
      const name = nameInput.value.trim();
      const valueRaw = valueInput.value.trim();
      const value = Number(valueRaw);
      if (!name || valueRaw === "" || !Number.isFinite(value) || !Number.isInteger(value)) {
        showAuctionStatus("물품명과 정수 가치를 입력해주세요.", true);
        return;
      }
      try {
        await insertAuctionItems([{ item_name: name, value, memo: memoInput.value.trim() || null }]);
        nameInput.value = "";
        valueInput.value = "";
        memoInput.value = "";
        await fetchAuctionItems();
        renderAuctionCountBanner();
        renderAuctionList();
        showAuctionStatus(`${name}을(를) 등록했습니다.`);
      } catch (err) {
        showAuctionStatus("등록에 실패했습니다.", true);
      }
    });

    document.getElementById("auction-bulk-btn").addEventListener("click", async () => {
      const textarea = document.getElementById("auction-bulk-input");
      const { items, failedCount } = window.AdminAuctionParse.parseAuctionBulkText(textarea.value);
      if (items.length === 0) {
        showAuctionStatus("등록할 수 있는 줄이 없습니다.", true);
        return;
      }
      try {
        await insertAuctionItems(items);
        textarea.value = "";
        await fetchAuctionItems();
        renderAuctionCountBanner();
        renderAuctionList();
        showAuctionStatus(`${items.length}건 등록 완료` + (failedCount ? ` (형식 오류 ${failedCount}건 제외)` : ""));
      } catch (err) {
        showAuctionStatus("일괄 등록에 실패했습니다.", true);
      }
    });
  }

  document.querySelectorAll(".tab-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tab-btn").forEach((b) => b.classList.remove("active"));
      btn.classList.add("active");
      const tab = btn.dataset.tab;
      document.getElementById("tab-elim").classList.toggle("hidden", tab !== "elim");
      document.getElementById("tab-auction").classList.toggle("hidden", tab !== "auction");
      if (tab === "auction" && !auctionTabInitialized) {
        auctionTabInitialized = true;
        initAuctionTab();
      }
    });
  });
})();
</script>
</body>
</html>
