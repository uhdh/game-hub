<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우승자 예측 · 피의 게임 X 시뮬레이터</title>
<link rel="icon" type="image/png" href="./assets/favicon.png">
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<script defer src="/_vercel/insights/script.js"></script>
<style>
  :root {
    --bg: #0b0c0f;
    --panel: #181b20;
    --panel-light: #21252b;
    --border: rgba(255,255,255,.10);
    --border-strong: rgba(255,255,255,.18);
    --text: #f7f9fb;
    --text-dim: #b7bfcc;
    --text-dimmer: #838c9b;
    --accent: #5fb8b0;
    --accent-hover: #7fcac3;
    --gold: #ffd166;
    --silver: #d7dbe0;
    --bronze: #e0a45f;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Pretendard", -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { color: var(--accent-hover); }

  #app {
    max-width: 460px;
    margin: 0 auto;
    padding: 28px 18px 64px;
    display: flex;
    flex-direction: column;
    gap: 26px;
  }

  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }
  .header-text { display: flex; flex-direction: column; gap: 8px; }
  .title {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  .subtitle { font-size: 13.5px; color: var(--text-dim); line-height: 1.5; }

  .btn-ghost {
    flex: 0 0 auto;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--panel-light);
    border: 1px solid var(--border-strong);
    color: var(--text);
    font-size: 13px;
    font-weight: 700;
    padding: 9px 16px;
    border-radius: 10px;
    cursor: pointer;
  }
  .btn-ghost:hover { background: #2b3138; border-color: var(--accent); }

  .status-banner {
    display: none;
    background: rgba(95,184,176,.12);
    border: 1px solid rgba(95,184,176,.35);
    border-radius: 14px;
    padding: 13px 15px;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--accent-hover);
  }
  .status-banner.show { display: block; }
  .status-banner.warn {
    background: rgba(224,120,111,.14);
    border-color: rgba(224,120,111,.4);
    color: #f0a89f;
  }

  .section-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14.5px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: .01em;
    padding: 0 2px;
  }
  .section-title::before {
    content: "";
    width: 4px;
    height: 14px;
    border-radius: 2px;
    background: var(--accent);
  }

  .team-block {
    display: flex;
    flex-direction: column;
    gap: 9px;
  }
  .team-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    align-self: flex-start;
    font-size: 12.5px;
    font-weight: 800;
    color: var(--team-color, var(--accent));
    background: color-mix(in srgb, var(--team-color, var(--accent)) 16%, transparent);
    border-radius: 8px;
    padding: 3px 10px;
  }
  .team-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 7px;
  }

  .pick-card {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0;
    overflow: hidden;
    cursor: pointer;
    text-align: center;
    transition: border-color .12s ease, background .12s ease, transform .12s ease;
  }
  .pick-card:hover { border-color: rgba(95,184,176,.5); transform: translateY(-1px); }
  .pick-card.selected {
    border-color: var(--accent);
    background: rgba(95,184,176,.1);
    box-shadow: 0 0 0 1px var(--accent) inset;
  }
  .pick-card.eliminated {
    cursor: not-allowed;
    opacity: .55;
  }
  .pick-card.eliminated:hover { transform: none; border-color: var(--border); }
  .pick-card.eliminated .pick-name { text-decoration: line-through; }

  .avatar {
    position: relative;
    flex: 0 0 auto;
    overflow: hidden;
    background: var(--panel-light);
    border: 1px solid var(--border-strong);
  }
  .pick-card .avatar {
    width: 100%;
    aspect-ratio: 3 / 4;
    border-radius: 0;
    border: none;
    border-bottom: 2px solid color-mix(in srgb, var(--team-color, var(--accent)) 55%, var(--border-strong));
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .avatar-46 { width: 46px; height: 46px; border-radius: 12px; }
  .avatar-x {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(10,6,6,.45);
  }
  .avatar-x::before, .avatar-x::after {
    content: "";
    position: absolute;
    width: 130%; height: 3px;
    background: #ff4d4d;
    box-shadow: 0 0 4px rgba(255,77,77,.7);
    top: 50%; left: 50%;
  }
  .avatar-x::before { transform: translate(-50%,-50%) rotate(45deg); }
  .avatar-x::after { transform: translate(-50%,-50%) rotate(-45deg); }

  .pick-info {
    min-width: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 7px 4px 9px;
  }
  .pick-name { font-size: 12.5px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
  .pick-meta { font-size: 10px; font-weight: 600; color: #f0a89f; }
  .selected-check {
    position: absolute;
    top: 5px; right: 5px;
    width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    background: var(--accent);
    color: #0b0c0f;
    font-size: 12px;
    font-weight: 900;
  }

  .results-list { display: flex; flex-direction: column; gap: 9px; }
  .result-row {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 13px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .result-row.mine { border-color: var(--accent); background: rgba(95,184,176,.08); }
  .result-rank {
    flex: 0 0 auto;
    width: 26px;
    text-align: center;
    font-size: 13px;
    font-weight: 800;
    color: var(--text-dimmer);
  }
  .result-rank.gold { color: var(--gold); font-size: 18px; }
  .result-rank.silver { color: var(--silver); font-size: 18px; }
  .result-rank.bronze { color: var(--bronze); font-size: 18px; }

  .avatar-54 { width: 54px; height: 54px; border-radius: 12px; }
  .avatar-badge {
    position: absolute; left: 0; right: 0; bottom: 0;
    display: flex; flex-direction: column; align-items: center;
    gap: 0;
    padding: 3px 2px 4px;
    background: linear-gradient(180deg, rgba(11,12,15,0) 0%, rgba(11,12,15,.92) 45%);
    text-align: center;
  }
  .avatar-badge .odds {
    font-size: 11.5px;
    font-weight: 800;
    color: #ffd166;
    line-height: 1.15;
  }
  .avatar-badge .pct {
    font-size: 9px;
    font-weight: 700;
    color: #f7f9fb;
    line-height: 1.15;
  }

  .result-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 6px; }
  .result-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13.5px;
    gap: 8px;
  }
  .result-name { font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 6px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .result-count { flex: 0 0 auto; color: var(--text-dim); font-weight: 700; font-variant-numeric: tabular-nums; }
  .result-bar-track {
    height: 7px;
    border-radius: 4px;
    background: var(--panel-light);
    overflow: hidden;
  }
  .result-bar-fill {
    height: 100%;
    border-radius: 4px;
    min-width: 3px;
    transition: width .25s ease;
  }
  .mine-tag {
    flex: 0 0 auto;
    font-size: 10px;
    font-weight: 800;
    color: var(--bg);
    background: var(--accent);
    border-radius: 6px;
    padding: 2px 7px;
  }

  .total-votes {
    font-size: 12.5px;
    font-weight: 600;
    color: var(--text-dimmer);
    text-align: center;
  }
</style>
</head>
<body>
<div id="app">
  <div class="header-row">
    <div class="header-text">
      <span class="title">우승자 예측</span>
      <span class="subtitle">매주 한 명씩 탈락합니다. 최종 우승자를 예측해보세요.</span>
    </div>
    <a class="btn-ghost" href="https://pgamex.vercel.app/">홈</a>
  </div>

  <div class="status-banner" id="status-banner"></div>

  <div class="section-title">참가자 (팀별)</div>
  <div id="teams"></div>

  <div class="section-title">실시간 예측 현황</div>
  <div class="results-list" id="results"></div>
  <div class="total-votes" id="total-votes"></div>
</div>

<script>
(function () {
  "use strict";

  const SUPABASE_URL = "https://paktzmofotvwfdxcpmzv.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_jWbstEn2pKJTNDxLTR4Jig_asglvzGW";
  const SUPABASE_TABLE = "winner_votes";
  const ELIMINATIONS_TABLE = "eliminations";
  const VOTER_ID_KEY = "bloodGameXVoterId";
  const MY_PICK_KEY = "bloodGameXMyPick";

  const TEAMS = [
    { key: "P1", label: "P1팀", color: "#ff6b6b", members: ["이상민", "박지민", "정근우", "이태균"] },
    { key: "P2", label: "P2팀", color: "#ffd166", members: ["하승진", "현성주", "윤비", "이진형"] },
    { key: "P3", label: "P3팀", color: "#51cf66", members: ["홍진호", "서출구", "최혜선", "허성범"] },
    { key: "C", label: "C팀", color: "#4dabf7", members: ["김경훈", "김유현", "김남희", "강지후"] },
    { key: "R", label: "R팀", color: "#cc5de8", members: ["곽범", "이관희", "신승용", "최연청"] },
  ];

  const PARTICIPANTS = TEAMS.flatMap(team =>
    team.members.map(name => ({
      key: `${team.key}-${name}`,
      name,
      teamKey: team.key,
      teamLabel: team.label,
      teamColor: team.color,
    }))
  );

  function photoUrl(name) {
    return `./assets/contestants/${encodeURIComponent(name)}.jpg`;
  }

  // 탈락자 목록은 admin.html에서 관리하는 eliminations 테이블에서 매번 불러옴
  let ELIMINATED_MAP = new Map();

  async function fetchEliminations() {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/${ELIMINATIONS_TABLE}?select=participant_key,week`,
      { headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` } }
    );
    if (!res.ok) throw new Error("탈락자 목록 조회 실패");
    const rows = await res.json();
    ELIMINATED_MAP = new Map(rows.map(r => [r.participant_key, r.week]));
  }

  function getVoterId() {
    let id = localStorage.getItem(VOTER_ID_KEY);
    if (!id) {
      id = crypto.randomUUID();
      localStorage.setItem(VOTER_ID_KEY, id);
    }
    return id;
  }

  function getMyPick() {
    return localStorage.getItem(MY_PICK_KEY);
  }
  function setMyPick(key) {
    localStorage.setItem(MY_PICK_KEY, key);
  }

  function showStatus(msg, isWarn) {
    const el = document.getElementById("status-banner");
    el.textContent = msg;
    el.className = "status-banner show" + (isWarn ? " warn" : "");
  }
  function hideStatus() {
    document.getElementById("status-banner").className = "status-banner";
  }

  async function fetchAllVotes() {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?select=participant_key`,
      { headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` } }
    );
    if (!res.ok) throw new Error("투표 현황 조회 실패");
    return res.json();
  }

  async function submitVote(participantKey) {
    const voterId = getVoterId();
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?on_conflict=voter_id`,
      {
        method: "POST",
        headers: {
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
          "Content-Type": "application/json",
          Prefer: "resolution=merge-duplicates,return=representation",
        },
        body: JSON.stringify({
          voter_id: voterId,
          participant_key: participantKey,
          updated_at: new Date().toISOString(),
        }),
      }
    );
    if (!res.ok) throw new Error("예측 등록 실패");
  }

  function renderTeams(selectedKey) {
    const wrap = document.getElementById("teams");
    wrap.innerHTML = "";
    wrap.style.display = "flex";
    wrap.style.flexDirection = "column";
    wrap.style.gap = "16px";

    for (const team of TEAMS) {
      const block = document.createElement("div");
      block.className = "team-block";

      const label = document.createElement("div");
      label.className = "team-label";
      label.style.setProperty("--team-color", team.color);
      label.textContent = team.label;
      block.appendChild(label);

      const grid = document.createElement("div");
      grid.className = "team-grid";

      for (const name of team.members) {
        const key = `${team.key}-${name}`;
        const eliminatedWeek = ELIMINATED_MAP.get(key);
        const isSelected = key === selectedKey;
        const card = document.createElement("button");
        card.type = "button";
        card.className = "pick-card" + (isSelected ? " selected" : "") + (eliminatedWeek ? " eliminated" : "");
        card.disabled = !!eliminatedWeek;
        card.style.setProperty("--team-color", team.color);
        card.innerHTML = `
          <div class="avatar">
            <img src="${photoUrl(name)}" alt="${name}" loading="lazy">
            ${eliminatedWeek ? '<div class="avatar-x"></div>' : ""}
            ${isSelected ? '<span class="selected-check">✓</span>' : ""}
          </div>
          <span class="pick-info">
            <span class="pick-name">${name}</span>
            ${eliminatedWeek ? `<span class="pick-meta">${eliminatedWeek}주차 탈락</span>` : ""}
          </span>
        `;
        if (!eliminatedWeek) {
          card.addEventListener("click", () => onPick(key, name));
        }
        grid.appendChild(card);
      }

      block.appendChild(grid);
      wrap.appendChild(block);
    }
  }

  const RANK_MEDAL = ["gold", "silver", "bronze"];

  function renderResults(votes, selectedKey) {
    const counts = new Map();
    for (const p of PARTICIPANTS) counts.set(p.key, 0);
    for (const v of votes) {
      if (counts.has(v.participant_key)) counts.set(v.participant_key, counts.get(v.participant_key) + 1);
    }

    const ranked = PARTICIPANTS
      .map(p => ({ ...p, count: counts.get(p.key) || 0 }))
      .sort((a, b) => b.count - a.count);

    const maxCount = Math.max(1, ranked[0] ? ranked[0].count : 0);
    const totalVotes = votes.length;

    const list = document.getElementById("results");
    list.innerHTML = "";
    ranked.forEach((p, idx) => {
      const medal = idx < 3 && p.count > 0 ? RANK_MEDAL[idx] : "";
      const pct = totalVotes > 0 ? (p.count / totalVotes) * 100 : 0;
      const odds = totalVotes > 0 && p.count > 0 ? totalVotes / p.count : null;
      const pctText = totalVotes > 0 ? `${pct.toFixed(0)}%` : "-%";
      const oddsText = odds !== null ? `${odds.toFixed(1)}배` : "-배";
      const row = document.createElement("div");
      row.className = "result-row" + (p.key === selectedKey ? " mine" : "");
      row.innerHTML = `
        <span class="result-rank${medal ? ` ${medal}` : ""}">${medal ? "●" : idx + 1}</span>
        <div class="avatar avatar-54">
          <img src="${photoUrl(p.name)}" alt="${p.name}" loading="lazy">
          ${ELIMINATED_MAP.has(p.key) ? '<div class="avatar-x"></div>' : ""}
          <div class="avatar-badge">
            <span class="odds">${oddsText}</span>
            <span class="pct">${p.count}표 · ${pctText}</span>
          </div>
        </div>
        <div class="result-main">
          <div class="result-top">
            <span class="result-name">${p.name}${p.key === selectedKey ? '<span class="mine-tag">내 예측</span>' : ""}</span>
            <span class="result-count">${p.count}표</span>
          </div>
          <div class="result-bar-track">
            <div class="result-bar-fill" style="width:${(p.count / maxCount) * 100}%;background:${p.teamColor}"></div>
          </div>
        </div>
      `;
      list.appendChild(row);
    });

    document.getElementById("total-votes").textContent = `총 ${votes.length}표 참여`;
  }

  async function refresh(selectedKey) {
    const votes = await fetchAllVotes();
    renderResults(votes, selectedKey);
  }

  async function onPick(key, name) {
    let selectedKey = getMyPick();
    renderTeams(key);
    try {
      await submitVote(key);
      setMyPick(key);
      showStatus(`${name}님으로 예측을 등록했습니다.`);
      await refresh(key);
    } catch (err) {
      showStatus("예측 등록에 실패했습니다. 잠시 후 다시 시도해주세요.", true);
      renderTeams(selectedKey);
    }
  }

  async function init() {
    try {
      await fetchEliminations();
    } catch (err) {
      // 탈락자 목록을 못 불러와도 투표 자체는 계속 가능하게 둠
    }
    let selectedKey = getMyPick();
    if (selectedKey && ELIMINATED_MAP.has(selectedKey)) {
      const p = PARTICIPANTS.find(p => p.key === selectedKey);
      showStatus(`예측하신 ${p ? p.name : ""}님이 탈락했습니다. 다시 예측해주세요.`, true);
      selectedKey = null;
    }
    renderTeams(selectedKey);
    try {
      await refresh(selectedKey);
    } catch (err) {
      document.getElementById("total-votes").textContent = "투표 현황을 불러오지 못했습니다.";
    }
  }

  init();
})();
</script>
</body>
</html>
