<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>피의 게임 X 시뮬레이터</title>
<link rel="icon" type="image/png" href="./assets/favicon.png">
<script defer src="/_vercel/insights/script.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #0f0f12;
    min-height: 100vh;
  }
  a { color: #5fb8b0; text-decoration: none; }
  a:hover { color: #7fcac3; }

  #app {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 32px 16px calc(96px + env(safe-area-inset-bottom));
  }
  .col {
    width: 100%;
    max-width: 430px;
    display: flex;
    flex-direction: column;
    gap: 26px;
    font-family: -apple-system, "Pretendard", "Segoe UI", "Malgun Gothic", sans-serif;
    color: #e7ebee;
  }

  .header {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 4px 4px 0;
  }
  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }
  .header-actions {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }
  .header .title {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .header .subtitle {
    font-size: 13px;
    color: #8992a0;
  }

  .announcement-btn {
    flex: 0 0 auto;
    position: relative;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12.5px;
    font-weight: 600;
    color: #c3c9d1;
    background: #15181c;
    border: 1px solid rgba(255, 255, 255, .08);
    border-radius: 999px;
    padding: 8px 14px;
    cursor: pointer;
    font-family: inherit;
    margin-top: 2px;
  }
  .announcement-btn:hover {
    border-color: rgba(95, 184, 176, .4);
  }
  .announcement-dot {
    display: none;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #e3675a;
  }
  .announcement-dot.show {
    display: inline-block;
  }

  .floating-actions {
    position: fixed;
    right: 16px;
    bottom: calc(20px + env(safe-area-inset-bottom));
    left: 16px;
    z-index: 40;
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap: 8px;
  }
  .floating-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12.5px;
    font-weight: 600;
    color: #c3c9d1;
    background: #15181c;
    border: 1px solid rgba(255, 255, 255, .08);
    border-radius: 999px;
    padding: 8px 14px;
    box-shadow: 0 4px 14px rgba(0, 0, 0, .35);
    white-space: nowrap;
  }
  .floating-btn:hover {
    border-color: rgba(95, 184, 176, .4);
    color: #c3c9d1;
  }

  @media (max-width: 480px) {
    .floating-actions {
      gap: 6px;
    }
    .floating-btn {
      font-size: 11.5px;
      padding: 7px 10px;
      gap: 4px;
    }
  }

  @keyframes ann-pop { 0% { transform: scale(.94); opacity: 0 } 100% { transform: scale(1); opacity: 1 } }
  .ann-overlay {
    position: fixed; inset: 0;
    background: rgba(10, 10, 14, .72);
    display: none;
    align-items: center; justify-content: center;
    z-index: 60;
    padding: 20px;
  }
  .ann-overlay.show { display: flex; }
  .ann-box {
    width: 100%;
    max-width: 420px;
    max-height: 82vh;
    display: flex;
    flex-direction: column;
    background: #1c2024;
    border: 1px solid rgba(255, 255, 255, .08);
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, .5);
    animation: ann-pop .18s ease;
    overflow: hidden;
  }
  .ann-head {
    flex: 0 0 auto;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    padding: 20px 20px 14px;
    border-bottom: 1px solid rgba(255, 255, 255, .06);
  }
  .ann-head-title {
    display: block;
    font-size: 19px;
    font-weight: 800;
    color: #e7ebee;
  }
  .ann-meta {
    display: block;
    margin-top: 4px;
    font-size: 11.5px;
    color: #8992a0;
  }
  .ann-close {
    flex: 0 0 auto;
    background: none;
    border: none;
    color: #8992a0;
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    padding: 4px;
  }
  .ann-close:hover { color: #e7ebee; }
  .ann-body {
    overflow-y: auto;
    padding: 18px 20px 24px;
  }
  .ann-intro {
    font-size: 13.5px;
    line-height: 1.6;
    color: #c3c9d1;
    margin: 0 0 12px;
  }
  .ann-link-btn {
    display: inline-block;
    background: none;
    border: none;
    color: #5fb8b0;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    padding: 0;
    font-family: inherit;
  }
  .ann-link-btn:hover { color: #7fcac3; }
  .ann-intro-more {
    margin-top: 10px;
    font-size: 13px;
    line-height: 1.65;
    color: #a9b0bb;
  }
  .ann-intro-more p { margin: 0 0 8px; }
  .ann-intro-more p:last-child { margin-bottom: 0; }
  .ann-info-box {
    margin-top: 16px;
    background: #15181c;
    border: 1px solid rgba(255, 255, 255, .06);
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 12.5px;
    line-height: 1.6;
    color: #a9b0bb;
  }
  .ann-info-box strong { color: #e7ebee; }
  .ann-history-head {
    margin: 22px 0 12px;
    font-size: 15px;
    font-weight: 800;
    color: #e7ebee;
  }
  .ann-history-item {
    padding: 12px 0;
    border-top: 1px solid rgba(255, 255, 255, .06);
  }
  .ann-history-item:first-child { border-top: none; }
  .ann-history-title-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13.5px;
    font-weight: 700;
    color: #e7ebee;
    margin-bottom: 6px;
  }
  .ann-new-badge {
    flex: 0 0 auto;
    background: #2f6f63;
    color: #d5f3ec;
    font-size: 10px;
    font-weight: 800;
    padding: 2px 7px;
    border-radius: 999px;
    letter-spacing: .02em;
  }
  .ann-history-date {
    color: #8992a0;
    font-weight: 600;
  }
  .ann-history-bullets {
    margin: 0;
    padding-left: 18px;
    font-size: 12.5px;
    line-height: 1.6;
    color: #a9b0bb;
  }
  .ann-history-bullets li { margin-bottom: 4px; }
  .ann-history-bullets li:last-child { margin-bottom: 0; }
  .ann-empty {
    font-size: 12.5px;
    color: #5b6270;
    padding: 8px 0;
  }

  .chat-modal-body {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 14px 20px 20px;
    min-height: 0;
    color: #e7ebee;
  }
  .chat-nickname-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #8992a0;
  }
  .chat-nickname-row input {
    width: 120px;
    background: #15181c;
    border: 1px solid rgba(255, 255, 255, .1);
    border-radius: 8px;
    padding: 6px 8px;
    color: #e7ebee;
    font-size: 12px;
    font-family: inherit;
  }
  .chat-box {
    background: #15181c;
    border: 1px solid rgba(255, 255, 255, .06);
    border-radius: 12px;
    padding: 12px;
    height: 42vh;
    min-height: 240px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .chat-empty {
    margin: auto;
    text-align: center;
    color: #5b6270;
    font-size: 13px;
  }
  .msg-row {
    display: flex;
    flex-direction: column;
    gap: 2px;
    max-width: 82%;
  }
  .msg-row.mine {
    align-self: flex-end;
    align-items: flex-end;
  }
  .msg-meta {
    display: flex;
    gap: 6px;
    font-size: 11px;
    color: #5b6270;
    padding: 0 2px;
  }
  .msg-nickname {
    font-weight: 700;
    color: #8992a0;
  }
  .msg-bubble {
    background: #1c2024;
    border: 1px solid rgba(255, 255, 255, .08);
    border-radius: 12px;
    padding: 8px 12px;
    font-size: 13.5px;
    line-height: 1.4;
    word-break: break-word;
  }
  .msg-row.mine .msg-bubble {
    background: rgba(95, 184, 176, .16);
    border-color: rgba(95, 184, 176, .4);
  }
  .chat-composer {
    display: flex;
    gap: 8px;
  }
  .chat-composer input[type="text"] {
    flex: 1;
    min-width: 0;
    background: #15181c;
    border: 1px solid rgba(255, 255, 255, .1);
    border-radius: 10px;
    padding: 10px 12px;
    color: #e7ebee;
    font-size: 14px;
    font-family: inherit;
  }
  .chat-composer input[type="text"]::placeholder { color: #5b6270; }
  .chat-send-btn {
    flex: 0 0 auto;
    background: #5fb8b0;
    color: #0f0f12;
    border: none;
    border-radius: 10px;
    padding: 0 16px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }
  .chat-send-btn:disabled {
    background: #2a2e33;
    color: #5b6270;
    cursor: not-allowed;
  }
  .chat-status-msg {
    font-size: 12px;
    color: #e08a8a;
    min-height: 14px;
  }

  @media (min-width: 900px) {
    #chat-overlay {
      background: transparent;
      justify-content: flex-end;
      align-items: stretch;
      padding: 24px 24px 24px 0;
      pointer-events: none;
    }
    #chat-overlay .ann-box {
      pointer-events: auto;
      width: 340px;
      max-width: 340px;
      max-height: none;
      box-shadow: -12px 0 40px rgba(0, 0, 0, .4), 0 20px 60px rgba(0, 0, 0, .5);
    }
    #chat-overlay .chat-modal-body {
      flex: 1;
      min-height: 0;
    }
    #chat-overlay .chat-box {
      flex: 1;
      height: auto;
    }
  }

  .lb-section {
    padding: 14px 0;
    border-top: 1px solid rgba(255, 255, 255, .06);
  }
  .lb-section:first-child { border-top: none; padding-top: 0; }
  .lb-section-title {
    font-size: 14px;
    font-weight: 800;
    color: #e7ebee;
    margin-bottom: 8px;
  }
  .lb-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
    font-size: 12.5px;
  }
  .lb-row .no {
    flex: 0 0 auto;
    width: 16px;
    color: #8992a0;
    font-weight: 700;
  }
  .lb-row .nick {
    flex: 1;
    min-width: 0;
    color: #e7ebee;
    font-weight: 700;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .lb-row .meta {
    flex: 0 0 auto;
    color: #a9b0bb;
  }

  .game-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .game-card {
    display: flex;
    align-items: center;
    gap: 16px;
    background: #15181c;
    border: 1px solid rgba(255, 255, 255, .06);
    border-radius: 18px;
    padding: 14px 16px;
    box-shadow: 0 12px 30px rgba(0, 0, 0, .35);
    text-decoration: none;
    transition: border-color .15s ease;
  }
  .game-card:hover {
    border-color: rgba(95, 184, 176, .4);
  }

  .icon-quads {
    flex: 0 0 auto;
    width: 56px;
    height: 56px;
    border-radius: 14px;
    overflow: hidden;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 2px;
    padding: 2px;
    background: #1c2024;
    border: 1px solid rgba(255, 255, 255, .08);
  }
  .icon-quads span {
    border-radius: 3px;
  }

  .icon-image {
    flex: 0 0 auto;
    width: 56px;
    height: 56px;
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, .08);
  }
  .icon-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .icon-emoji {
    flex: 0 0 auto;
    width: 56px;
    height: 56px;
    border-radius: 14px;
    background: #1c2024;
    border: 1px solid rgba(255, 255, 255, .08);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
  }

  .icon-hex {
    flex: 0 0 auto;
    width: 56px;
    height: 56px;
    border-radius: 14px;
    overflow: hidden;
    position: relative;
    background: #1c2024;
    border: 1px solid rgba(255, 255, 255, .08);
  }
  .icon-hex .hex-wrap {
    position: absolute;
    width: 32px;
    height: 37px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .icon-hex .hex-label {
    position: relative;
    z-index: 1;
    font-size: 15px;
    font-weight: 800;
  }

  .game-info {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .game-info .name {
    font-size: 16.5px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .game-info .desc {
    font-size: 12.5px;
    color: #8992a0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .game-arrow {
    flex: 0 0 auto;
    font-size: 12px;
    font-weight: 600;
    color: #8992a0;
  }

  .more-soon {
    display: flex;
    align-items: center;
    gap: 12px;
    border: 1px dashed rgba(255, 255, 255, .1);
    border-radius: 18px;
    padding: 16px;
    color: #5b6270;
    font-size: 13px;
    justify-content: center;
  }
</style>
</head>
<body>
<div id="app">
  <div class="col">
    <div class="header">
      <div class="header-top">
        <div>
          <span class="title">피의 게임 X 시뮬레이터</span>
          <div class="subtitle">계속 새로운 게임이 추가됩니다.</div>
        </div>
        <div class="header-actions">
          <button type="button" id="announcement-btn" class="announcement-btn">
            <span>📢 공지사항</span>
            <span id="announcement-dot" class="announcement-dot"></span>
          </button>
        </div>
      </div>
    </div>

    <div class="game-list" id="game-list"></div>
  </div>
</div>

<div class="floating-actions">
  <button type="button" class="floating-btn" id="chat-btn">
    <span>💬 채팅</span>
  </button>
  <button type="button" class="floating-btn" id="leaderboard-btn">
    <span>🏆 전체 리더보드</span>
  </button>
  <a href="./predict.html" class="floating-btn">
    <span>🏆 우승자 예측</span>
  </a>
  <a href="./requests.html" class="floating-btn">
    <span>📝 요청 게시판</span>
  </a>
</div>

<div id="announcement-overlay" class="ann-overlay">
  <div class="ann-box">
    <div class="ann-head">
      <div>
        <span class="ann-head-title">공지사항</span>
        <span class="ann-meta">v<span id="ann-version"></span> · 배포 <span id="ann-date"></span></span>
      </div>
      <button type="button" id="ann-close" class="ann-close" aria-label="닫기">✕</button>
    </div>
    <div class="ann-body">
      <p class="ann-intro" id="ann-intro"></p>
      <button type="button" id="ann-intro-toggle" class="ann-link-btn" hidden>사이트 소개 보기 →</button>
      <div id="ann-intro-more" class="ann-intro-more" hidden></div>
      <div class="ann-info-box" id="ann-info-box" hidden></div>

      <div class="ann-history-head">업데이트 내역</div>
      <div id="ann-history-list" class="ann-history-list">
        <div class="ann-empty">불러오는 중...</div>
      </div>
    </div>
  </div>
</div>

<div id="chat-overlay" class="ann-overlay">
  <div class="ann-box">
    <div class="ann-head">
      <div>
        <span class="ann-head-title">실시간 채팅</span>
        <span class="ann-meta">게임 허브를 같이 쓰는 사람들과 대화해보세요</span>
      </div>
      <button type="button" id="chat-close" class="ann-close" aria-label="닫기">✕</button>
    </div>
    <div class="chat-modal-body">
      <div class="chat-nickname-row">
        <span>닉네임</span>
        <input type="text" id="chat-nickname-input" maxlength="20">
      </div>
      <div class="chat-box" id="chat-box"></div>
      <div class="chat-composer">
        <input type="text" id="chat-content-input" placeholder="메시지를 입력하세요" maxlength="200">
        <button class="chat-send-btn" id="chat-send-btn">전송</button>
      </div>
      <div class="chat-status-msg" id="chat-status-msg"></div>
    </div>
  </div>
</div>

<div id="leaderboard-overlay" class="ann-overlay">
  <div class="ann-box">
    <div class="ann-head">
      <div>
        <span class="ann-head-title">전체 게임 리더보드</span>
      </div>
      <button type="button" id="lb-close" class="ann-close" aria-label="닫기">✕</button>
    </div>
    <div class="ann-body" id="lb-body"></div>
  </div>
</div>

<script>
  const GAMES = [
    {
      name: '모자이크 퍼즐',
      desc: '컬러 타일을 이어붙여 최고 점수를 노려보세요',
      href: 'https://pgamex.vercel.app/rearrange.html',
      target: '_self',
      quads: ['#c96a63', '#d3b263', '#5ca892', '#5b8fc4'],
    },
    {
      name: '3단 오목',
      desc: '삼각 격자 91교점에서 흑/백 돌을 놓고 3층까지 쌓으세요',
      href: './gomoku-stack.html',
      target: '_self',
      quads: ['#1c1c1c', '#f0ece2', '#1c1c1c', '#f0ece2'],
    },
    {
      name: '지각변동',
      desc: '무너지는 육각 타일 위에서 점수 높은 땅으로 말을 밀어붙이세요',
      href: './tectonic-shift.html',
      target: '_self',
      hexIcon: [
        { left: 14, top: -9, bg: '#f0ece2', label: '5', color: '#c97a76' },
        { left: 28, top: 20, bg: '#f0ece2', label: '1', color: '#a89bc9' },
        { left: 0, top: 20, bg: '#f0ece2', label: '4', color: '#c9a56b' },
        { left: -14, top: -6, bg: '#141414', label: '', color: '' },
      ],
    },
    {
      name: '블라인드 경매',
      desc: '가격이 비공개된 물품을 큐브로 낙찰받아 최고가를 노려보세요',
      href: './blind-auction.html',
      target: '_self',
      emoji: '🔨',
    },
    {
      name: '돈벌레 게임',
      desc: '베팅하고 굴려서 배당을 노려보세요',
      href: 'https://cockroach-gambling-board.web.app/',
      target: '_self',
      image: './assets/donbeolle-1.png',
    },
  ];

  const list = document.getElementById('game-list');

  for (const g of GAMES) {
    const card = document.createElement('a');
    card.className = 'game-card';
    card.href = g.href;
    card.target = g.target;
    card.rel = 'noopener';

    const HEX_POLY = '16,0 32,9.25 32,27.75 16,37 0,27.75 0,9.25';
    let iconHtml;
    if (g.quads) {
      iconHtml = `<div class="icon-quads">${g.quads.map(c => `<span style="background:${c}"></span>`).join('')}</div>`;
    } else if (g.hexIcon) {
      const hexes = g.hexIcon.map(hx => `
        <div class="hex-wrap" style="left:${hx.left}px;top:${hx.top}px">
          <svg width="32" height="37" style="position:absolute;left:0;top:0;pointer-events:none">
            <polygon points="${HEX_POLY}" fill="${hx.bg}" stroke="#000" stroke-width="1"></polygon>
          </svg>
          <span class="hex-label" style="color:${hx.color}">${hx.label}</span>
        </div>
      `).join('');
      iconHtml = `<div class="icon-hex">${hexes}</div>`;
    } else if (g.image) {
      iconHtml = `<div class="icon-image"><img src="${g.image}" alt=""></div>`;
    } else {
      iconHtml = `<div class="icon-emoji">${g.emoji}</div>`;
    }

    card.innerHTML = `
      ${iconHtml}
      <div class="game-info">
        <span class="name">${g.name}</span>
        <span class="desc">${g.desc}</span>
      </div>
      <span class="game-arrow">→</span>
    `;

    list.appendChild(card);
  }

  const more = document.createElement('div');
  more.className = 'more-soon';
  more.textContent = '더 많은 게임이 곧 추가됩니다';
  list.appendChild(more);

  // ---- 공지사항 ----
  const ANNOUNCEMENT_SUPABASE_URL = 'https://paktzmofotvwfdxcpmzv.supabase.co';
  const ANNOUNCEMENT_SUPABASE_ANON_KEY = 'sb_publishable_jWbstEn2pKJTNDxLTR4Jig_asglvzGW';
  const ANNOUNCEMENT_SEEN_KEY = 'gamehub_announcement_seen_version';

  const annBtn = document.getElementById('announcement-btn');
  const annDot = document.getElementById('announcement-dot');
  const annOverlay = document.getElementById('announcement-overlay');
  const annClose = document.getElementById('ann-close');
  const annIntro = document.getElementById('ann-intro');
  const annIntroToggle = document.getElementById('ann-intro-toggle');
  const annIntroMore = document.getElementById('ann-intro-more');
  const annInfoBox = document.getElementById('ann-info-box');
  const annHistoryList = document.getElementById('ann-history-list');

  let announcementVersion = '';

  function annHeaders(extra) {
    return Object.assign(
      {
        apikey: ANNOUNCEMENT_SUPABASE_ANON_KEY,
        Authorization: `Bearer ${ANNOUNCEMENT_SUPABASE_ANON_KEY}`,
      },
      extra || {}
    );
  }

  async function loadAnnouncement() {
    try {
      const [headRes, historyRes] = await Promise.all([
        fetch(`${ANNOUNCEMENT_SUPABASE_URL}/rest/v1/site_announcement?select=version,deploy_date,intro,intro_more,service_info&id=eq.1`, { headers: annHeaders() }),
        fetch(`${ANNOUNCEMENT_SUPABASE_URL}/rest/v1/site_announcement_history?select=id,entry_date,title,bullets&order=entry_date.desc,id.desc&limit=30`, { headers: annHeaders() }),
      ]);
      if (!headRes.ok || !historyRes.ok) throw new Error('공지사항을 불러오지 못했습니다');
      const [head] = await headRes.json();
      const history = await historyRes.json();
      if (!head) throw new Error('공지사항이 비어 있습니다');

      announcementVersion = head.version;
      document.getElementById('ann-version').textContent = head.version;
      document.getElementById('ann-date').textContent = head.deploy_date;
      annIntro.textContent = head.intro || '';

      if (head.intro_more) {
        annIntroToggle.hidden = false;
        annIntroMore.innerHTML = head.intro_more.split('\n').filter(Boolean).map(p => `<p>${p}</p>`).join('');
      }
      if (head.service_info) {
        annInfoBox.hidden = false;
        annInfoBox.innerHTML = `<strong>서비스 안내</strong> ${head.service_info}`;
      }

      annHistoryList.innerHTML = '';
      if (!history.length) {
        annHistoryList.innerHTML = '<div class="ann-empty">아직 등록된 업데이트 내역이 없습니다.</div>';
      } else {
        history.forEach((entry, idx) => {
          const bullets = Array.isArray(entry.bullets) ? entry.bullets : [];
          const item = document.createElement('div');
          item.className = 'ann-history-item';
          item.innerHTML = `
            <div class="ann-history-title-row">
              ${idx === 0 ? '<span class="ann-new-badge">NEW</span>' : ''}
              <span class="ann-history-date">${entry.entry_date}</span>
              <span>${entry.title}</span>
            </div>
            <ul class="ann-history-bullets">
              ${bullets.map(b => `<li>${b}</li>`).join('')}
            </ul>
          `;
          annHistoryList.appendChild(item);
        });
      }

      if (localStorage.getItem(ANNOUNCEMENT_SEEN_KEY) !== announcementVersion) {
        annDot.classList.add('show');
      }
    } catch (e) {
      annHistoryList.innerHTML = '<div class="ann-empty">공지사항을 불러오지 못했습니다.</div>';
    }
  }
  loadAnnouncement();

  function openAnnouncement() {
    annOverlay.classList.add('show');
    if (announcementVersion) localStorage.setItem(ANNOUNCEMENT_SEEN_KEY, announcementVersion);
    annDot.classList.remove('show');
  }
  function closeAnnouncement() {
    annOverlay.classList.remove('show');
  }

  annBtn.addEventListener('click', openAnnouncement);
  annClose.addEventListener('click', closeAnnouncement);
  annOverlay.addEventListener('click', (e) => {
    if (e.target === annOverlay) closeAnnouncement();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && annOverlay.classList.contains('show')) closeAnnouncement();
  });
  annIntroToggle.addEventListener('click', () => {
    const isHidden = annIntroMore.hidden;
    annIntroMore.hidden = !isHidden;
    annIntroToggle.textContent = isHidden ? '사이트 소개 접기 ↑' : '사이트 소개 보기 →';
  });

  // ---- 실시간 채팅 ----
  const CHAT_TABLE = 'hub_chat_messages';
  const CHAT_NICKNAME_KEY = 'hubChatNickname';
  const CHAT_POLL_MS = 3000;
  const CHAT_HISTORY_LIMIT = 50;

  const NICKNAME_POOL = [
    '이상민', '정근우', '박지민', '이태균', '하승진', '현성주', '윤비', '이진형', '홍진호', '서출구',
    '최혜선', '허성범', '김경훈', '김유현', '김남희', '강지후', '곽범', '이관희', '신승용', '덕후',
  ];
  function randomNickname() {
    const word = NICKNAME_POOL[Math.floor(Math.random() * NICKNAME_POOL.length)];
    const num = Math.floor(Math.random() * 999) + 1;
    return `${word}#${num}`;
  }
  function getOrCreateStoredNickname(key) {
    const saved = localStorage.getItem(key);
    if (saved) return saved;
    const generated = randomNickname();
    localStorage.setItem(key, generated);
    return generated;
  }

  const chatBtn = document.getElementById('chat-btn');
  const chatOverlay = document.getElementById('chat-overlay');
  const chatClose = document.getElementById('chat-close');
  const chatNicknameInput = document.getElementById('chat-nickname-input');
  const chatBox = document.getElementById('chat-box');
  const chatContentInput = document.getElementById('chat-content-input');
  const chatSendBtn = document.getElementById('chat-send-btn');
  const chatStatusEl = document.getElementById('chat-status-msg');

  chatNicknameInput.value = getOrCreateStoredNickname(CHAT_NICKNAME_KEY);
  chatNicknameInput.addEventListener('change', () => {
    const v = chatNicknameInput.value.trim();
    if (v) localStorage.setItem(CHAT_NICKNAME_KEY, v);
    else chatNicknameInput.value = getOrCreateStoredNickname(CHAT_NICKNAME_KEY);
  });

  let myChatNickname = chatNicknameInput.value;
  let chatLastId = -1;
  let chatLatestMessages = [];
  let chatPollTimer = null;

  function chatShowStatus(msg) {
    chatStatusEl.textContent = msg || '';
    if (msg) setTimeout(() => { if (chatStatusEl.textContent === msg) chatStatusEl.textContent = ''; }, 3000);
  }

  async function fetchChatMessages() {
    const res = await fetch(
      `${ANNOUNCEMENT_SUPABASE_URL}/rest/v1/${CHAT_TABLE}?select=id,nickname,content,created_at&order=created_at.desc&limit=${CHAT_HISTORY_LIMIT}`,
      { headers: annHeaders() }
    );
    if (!res.ok) throw new Error('메시지 조회 실패');
    const rows = await res.json();
    return rows.reverse();
  }

  async function sendChatMessage(nickname, content) {
    const res = await fetch(`${ANNOUNCEMENT_SUPABASE_URL}/rest/v1/${CHAT_TABLE}`, {
      method: 'POST',
      headers: annHeaders({ 'Content-Type': 'application/json', Prefer: 'return=minimal' }),
      body: JSON.stringify({ nickname, content }),
    });
    if (!res.ok) throw new Error('전송 실패');
  }

  function chatFormatTime(iso) {
    const d = new Date(iso);
    const pad = n => String(n).padStart(2, '0');
    return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  function chatIsScrolledToBottom() {
    return chatBox.scrollHeight - chatBox.scrollTop - chatBox.clientHeight < 40;
  }

  function renderChatMessages(messages) {
    const stickToBottom = chatIsScrolledToBottom();
    chatBox.innerHTML = '';

    if (!messages.length) {
      const empty = document.createElement('div');
      empty.className = 'chat-empty';
      empty.textContent = '아직 메시지가 없어요. 첫 메시지를 남겨보세요!';
      chatBox.appendChild(empty);
      return;
    }

    messages.forEach((m) => {
      const row = document.createElement('div');
      row.className = 'msg-row' + (m.nickname === myChatNickname ? ' mine' : '');
      row.innerHTML = `
        <div class="msg-meta">
          <span class="msg-nickname"></span>
          <span class="msg-time"></span>
        </div>
        <div class="msg-bubble"></div>
      `;
      row.querySelector('.msg-nickname').textContent = m.nickname;
      row.querySelector('.msg-time').textContent = chatFormatTime(m.created_at);
      row.querySelector('.msg-bubble').textContent = m.content;
      chatBox.appendChild(row);
    });

    if (stickToBottom) chatBox.scrollTop = chatBox.scrollHeight;
  }

  async function pollChatMessages() {
    try {
      const messages = await fetchChatMessages();
      const newLastId = messages.length ? messages[messages.length - 1].id : 0;
      if (newLastId !== chatLastId || messages.length !== chatLatestMessages.length) {
        chatLastId = newLastId;
        chatLatestMessages = messages;
        renderChatMessages(messages);
      }
    } catch (e) {
      chatShowStatus('메시지를 불러오지 못했어요');
    }
  }

  async function handleChatSend() {
    const content = chatContentInput.value.trim();
    if (!content) return;
    const nickname = chatNicknameInput.value.trim() || getOrCreateStoredNickname(CHAT_NICKNAME_KEY);
    myChatNickname = nickname;
    chatSendBtn.disabled = true;
    try {
      await sendChatMessage(nickname, content);
      chatContentInput.value = '';
      await pollChatMessages();
      chatBox.scrollTop = chatBox.scrollHeight;
    } catch (e) {
      chatShowStatus('전송에 실패했어요. 잠시 후 다시 시도해주세요');
    } finally {
      chatSendBtn.disabled = false;
      chatContentInput.focus();
    }
  }
  chatSendBtn.addEventListener('click', handleChatSend);
  chatContentInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleChatSend();
  });

  function openChat() {
    chatOverlay.classList.add('show');
    pollChatMessages().then(() => { chatBox.scrollTop = chatBox.scrollHeight; });
    if (!chatPollTimer) chatPollTimer = setInterval(pollChatMessages, CHAT_POLL_MS);
  }
  function closeChat() {
    chatOverlay.classList.remove('show');
    if (chatPollTimer) { clearInterval(chatPollTimer); chatPollTimer = null; }
  }
  chatBtn.addEventListener('click', openChat);
  chatClose.addEventListener('click', closeChat);
  chatOverlay.addEventListener('click', (e) => {
    if (e.target === chatOverlay) closeChat();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && chatOverlay.classList.contains('show')) closeChat();
  });

  // ---- 전체 게임 리더보드 ----
  const LB_SUPABASE_URL = 'https://paktzmofotvwfdxcpmzv.supabase.co';
  const LB_SUPABASE_ANON_KEY = 'sb_publishable_jWbstEn2pKJTNDxLTR4Jig_asglvzGW';

  function lbHeaders() {
    return { apikey: LB_SUPABASE_ANON_KEY, Authorization: `Bearer ${LB_SUPABASE_ANON_KEY}` };
  }

  async function fetchSimpleTop(table, selectFields, orderBy, limit) {
    const res = await fetch(
      `${LB_SUPABASE_URL}/rest/v1/${table}?select=${selectFields}&order=${orderBy}&limit=${limit}`,
      { headers: lbHeaders() }
    );
    if (!res.ok) throw new Error('리더보드 조회 실패');
    return res.json();
  }

  // 지각변동은 별도 랭킹 테이블이 없어, 대국 기록(1인 vs AI 2명, 사람은 항상 R)을
  // 닉네임별로 직접 집계한다. tectonic-shift.html의 fetchRanking과 동일한 로직.
  async function fetchTectonicTop(limit) {
    const res = await fetch(
      `${LB_SUPABASE_URL}/rest/v1/tectonic_shift_results?select=nicknames,winner_color,scores&mode=eq.vs_ai&order=created_at.desc&limit=2000`,
      { headers: lbHeaders() }
    );
    if (!res.ok) throw new Error('리더보드 조회 실패');
    const rows = await res.json();
    const stats = new Map();
    rows.forEach(r => {
      const nickname = r.nicknames && r.nicknames.R;
      if (!nickname) return;
      const s = stats.get(nickname) || { games: 0, wins: 0, scoreSum: 0 };
      s.games += 1;
      if (r.winner_color === 'R') s.wins += 1;
      s.scoreSum += (r.scores && typeof r.scores.R === 'number') ? r.scores.R : 0;
      stats.set(nickname, s);
    });
    return Array.from(stats.entries())
      .map(([nickname, s]) => ({
        nickname,
        wins: s.wins,
        losses: s.games - s.wins,
        winRate: s.games ? Math.round((s.wins / s.games) * 100) : 0,
        avgScore: s.games ? Math.round(s.scoreSum / s.games) : 0,
      }))
      .sort((a, b) => b.wins - a.wins || b.winRate - a.winRate)
      .slice(0, limit);
  }

  const LB_SECTIONS = [
    {
      label: '3단 오목 · 최상',
      fetch: (limit) => fetchSimpleTop('gomoku_extreme_ranking', 'nickname,rating,wins,losses', 'rating.desc', limit),
      format: r => `${r.wins}승 ${r.losses}패 · ${r.rating}점`,
    },
    {
      label: '지각변동',
      fetch: (limit) => fetchTectonicTop(limit),
      format: r => `${r.wins}승 ${r.losses}패 · ${r.winRate}% · 평균 ${r.avgScore}점`,
    },
    {
      label: '블라인드 경매',
      fetch: (limit) => fetchSimpleTop(
        'blind_auction_leaderboard',
        'nickname,score,category,acquired,auction_total',
        'score.desc,created_at.asc',
        limit
      ),
      format: r => {
        const labels = { art: '미술품', collectible: '소장품', coupang: '네이버 쇼핑 인기상품', youtube: '유튜브 조회수', billionaires: '포브스 억만장자' };
        const units = { art: '억원', collectible: '억원', coupang: '만원', youtube: '억회', billionaires: '조원' };
        return labels[r.category] && r.acquired != null && r.auction_total != null
          ? `${labels[r.category]} · ${r.score}% (${r.acquired}${units[r.category]} / ${r.auction_total}${units[r.category]})`
          : `${r.score}%`;
      },
    },
    {
      label: '모자이크 퍼즐',
      fetch: (limit) => fetchSimpleTop('color_connect_leaderboard', 'nickname,score', 'score.desc,created_at.asc', limit),
      format: r => `${r.score}점`,
    },
  ];

  const lbBtn = document.getElementById('leaderboard-btn');
  const lbOverlay = document.getElementById('leaderboard-overlay');
  const lbClose = document.getElementById('lb-close');
  const lbBody = document.getElementById('lb-body');

  async function loadLeaderboards() {
    lbBody.innerHTML = LB_SECTIONS.map((s, i) => `
      <div class="lb-section">
        <div class="lb-section-title">${s.label}</div>
        <div class="lb-rows" data-idx="${i}"><div class="ann-empty">불러오는 중...</div></div>
      </div>
    `).join('');

    await Promise.all(LB_SECTIONS.map(async (s, i) => {
      const rowsEl = lbBody.querySelector(`.lb-rows[data-idx="${i}"]`);
      try {
        const rows = await s.fetch(5);
        if (!rows.length) {
          rowsEl.innerHTML = '<div class="ann-empty">아직 등록된 기록이 없습니다.</div>';
          return;
        }
        rowsEl.innerHTML = rows.map((r, idx) => `
          <div class="lb-row">
            <span class="no">${idx + 1}</span>
            <span class="nick">${r.nickname}</span>
            <span class="meta">${s.format(r)}</span>
          </div>
        `).join('');
      } catch (e) {
        rowsEl.innerHTML = '<div class="ann-empty">불러오지 못했습니다.</div>';
      }
    }));
  }

  function openLeaderboard() {
    lbOverlay.classList.add('show');
    loadLeaderboards();
  }
  function closeLeaderboard() {
    lbOverlay.classList.remove('show');
  }

  lbBtn.addEventListener('click', openLeaderboard);
  lbClose.addEventListener('click', closeLeaderboard);
  lbOverlay.addEventListener('click', (e) => {
    if (e.target === lbOverlay) closeLeaderboard();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && lbOverlay.classList.contains('show')) closeLeaderboard();
  });
</script>
</body>
</html>
