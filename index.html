<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>피의 게임 X 시뮬레이터</title>
<link rel="icon" type="image/png" href="./assets/favicon.png">
<script defer src="/_vercel/insights/script.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #0f0f12;
    min-height: 100vh;
  }
  a { color: #5fb8b0; text-decoration: none; }
  a:hover { color: #7fcac3; }

  #app {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 32px 16px 48px;
  }
  .col {
    width: 100%;
    max-width: 430px;
    display: flex;
    flex-direction: column;
    gap: 26px;
    font-family: -apple-system, "Pretendard", "Segoe UI", "Malgun Gothic", sans-serif;
    color: #e7ebee;
  }

  .header {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 4px 4px 0;
  }
  .header .title {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .header .subtitle {
    font-size: 13px;
    color: #8992a0;
  }

  .game-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .game-card {
    display: flex;
    align-items: center;
    gap: 16px;
    background: #15181c;
    border: 1px solid rgba(255, 255, 255, .06);
    border-radius: 18px;
    padding: 14px 16px;
    box-shadow: 0 12px 30px rgba(0, 0, 0, .35);
    text-decoration: none;
    transition: border-color .15s ease;
  }
  .game-card:hover {
    border-color: rgba(95, 184, 176, .4);
  }

  .icon-quads {
    flex: 0 0 auto;
    width: 56px;
    height: 56px;
    border-radius: 14px;
    overflow: hidden;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 2px;
    padding: 2px;
    background: #1c2024;
    border: 1px solid rgba(255, 255, 255, .08);
  }
  .icon-quads span {
    border-radius: 3px;
  }

  .icon-image {
    flex: 0 0 auto;
    width: 56px;
    height: 56px;
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, .08);
  }
  .icon-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .icon-emoji {
    flex: 0 0 auto;
    width: 56px;
    height: 56px;
    border-radius: 14px;
    background: #1c2024;
    border: 1px solid rgba(255, 255, 255, .08);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
  }

  .icon-hex {
    flex: 0 0 auto;
    width: 56px;
    height: 56px;
    border-radius: 14px;
    overflow: hidden;
    position: relative;
    background: #1c2024;
    border: 1px solid rgba(255, 255, 255, .08);
  }
  .icon-hex .hex-wrap {
    position: absolute;
    width: 32px;
    height: 37px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .icon-hex .hex-label {
    position: relative;
    z-index: 1;
    font-size: 15px;
    font-weight: 800;
  }

  .game-info {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .game-info .name {
    font-size: 16.5px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .game-info .desc {
    font-size: 12.5px;
    color: #8992a0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .game-arrow {
    flex: 0 0 auto;
    font-size: 12px;
    font-weight: 600;
    color: #8992a0;
  }

  .more-soon {
    display: flex;
    align-items: center;
    gap: 12px;
    border: 1px dashed rgba(255, 255, 255, .1);
    border-radius: 18px;
    padding: 16px;
    color: #5b6270;
    font-size: 13px;
    justify-content: center;
  }
</style>
</head>
<body>
<div id="app">
  <div class="col">
    <div class="header">
      <span class="title">피의 게임 X 시뮬레이터</span>
      <span class="subtitle">계속 새로운 게임이 추가됩니다.</span>
    </div>

    <div class="game-list" id="game-list"></div>
  </div>
</div>

<script>
  const GAMES = [
    {
      name: '모자이크 퍼즐',
      desc: '컬러 타일을 이어붙여 최고 점수를 노려보세요',
      href: './color-connect.html',
      target: '_self',
      quads: ['#c96a63', '#d3b263', '#5ca892', '#5b8fc4'],
    },
    {
      name: '모자이크 퍼즐 - 재배치',
      desc: '타일을 배치하고 재배치해 점수를 완성하세요',
      href: './rearrange.html',
      target: '_self',
      quads: ['#c96a63', '#d3b263', '#5ca892', 'transparent'],
    },
    {
      name: '3단 오목',
      desc: '삼각 격자 91교점에서 흑/백 돌을 놓고 3층까지 쌓으세요',
      href: './gomoku-stack.html',
      target: '_self',
      quads: ['#1c1c1c', '#f0ece2', '#1c1c1c', '#f0ece2'],
    },
    {
      name: '지각변동3인',
      desc: '무너지는 육각 타일 위에서 점수 높은 땅으로 말을 밀어붙이세요',
      href: './tectonic-shift.html',
      target: '_self',
      hexIcon: [
        { left: 14, top: -9, bg: '#f0ece2', label: '5', color: '#c97a76' },
        { left: 28, top: 20, bg: '#f0ece2', label: '1', color: '#a89bc9' },
        { left: 0, top: 20, bg: '#f0ece2', label: '4', color: '#c9a56b' },
        { left: -14, top: -6, bg: '#141414', label: '', color: '' },
      ],
    },
    {
      name: '블라인드 경매',
      desc: '가격이 비공개된 물품을 큐브로 낙찰받아 최고가를 노려보세요',
      href: './blind-auction.html',
      target: '_self',
      emoji: '🔨',
    },
    {
      name: '돈벌레 게임',
      desc: '베팅하고 굴려서 배당을 노려보세요',
      href: 'https://cockroach-gambling-board.web.app/',
      target: '_self',
      image: './assets/donbeolle-1.png',
    },
    {
      name: '우승자 예측',
      desc: '매주 한 명씩 탈락, 최종 우승자를 예측해보세요',
      href: './predict.html',
      target: '_self',
      emoji: '🏆',
    },
  ];

  const list = document.getElementById('game-list');

  for (const g of GAMES) {
    const card = document.createElement('a');
    card.className = 'game-card';
    card.href = g.href;
    card.target = g.target;
    card.rel = 'noopener';

    const HEX_POLY = '16,0 32,9.25 32,27.75 16,37 0,27.75 0,9.25';
    let iconHtml;
    if (g.quads) {
      iconHtml = `<div class="icon-quads">${g.quads.map(c => `<span style="background:${c}"></span>`).join('')}</div>`;
    } else if (g.hexIcon) {
      const hexes = g.hexIcon.map(hx => `
        <div class="hex-wrap" style="left:${hx.left}px;top:${hx.top}px">
          <svg width="32" height="37" style="position:absolute;left:0;top:0;pointer-events:none">
            <polygon points="${HEX_POLY}" fill="${hx.bg}" stroke="#000" stroke-width="1"></polygon>
          </svg>
          <span class="hex-label" style="color:${hx.color}">${hx.label}</span>
        </div>
      `).join('');
      iconHtml = `<div class="icon-hex">${hexes}</div>`;
    } else if (g.image) {
      iconHtml = `<div class="icon-image"><img src="${g.image}" alt=""></div>`;
    } else {
      iconHtml = `<div class="icon-emoji">${g.emoji}</div>`;
    }

    card.innerHTML = `
      ${iconHtml}
      <div class="game-info">
        <span class="name">${g.name}</span>
        <span class="desc">${g.desc}</span>
      </div>
      <span class="game-arrow">→</span>
    `;

    list.appendChild(card);
  }

  const more = document.createElement('div');
  more.className = 'more-soon';
  more.textContent = '더 많은 게임이 곧 추가됩니다';
  list.appendChild(more);
</script>
</body>
</html>
